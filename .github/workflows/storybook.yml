name: Storybook

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser + system deps
        # `--with-deps` requires root, which CI has via sudo on
        # ubuntu-latest. Local dev runs the storybook server but skips
        # the test-runner pass when libnspr4 etc. aren't on the box.
        run: npx playwright install chromium --with-deps

      - name: Build Storybook
        run: npm run build-storybook

      # `test-storybook` walks every story declared under stories[]
      # in .storybook/main.ts, renders it in headless chromium, and
      # asserts that no story errors out at mount. Fails the build
      # on any render regression — the gate keeps stories from
      # rotting silently as components evolve.
      - name: Run test-storybook against the static build
        run: |
          npx http-server storybook-static --port 6006 --silent &
          npx wait-on tcp:6006
          npx test-storybook --url http://localhost:6006 --maxWorkers=2
