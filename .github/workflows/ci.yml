name: CI

# Quality gate for servicebay PRs. Replaces the previous split CI + Architecture
# workflows so all checks live in one place, run in parallel, and share a single
# concurrency group.
#
# Jobs (all run in parallel; each does its own npm ci against the setup-node cache):
#   lint        — eslint
#   typecheck   — tsc --noEmit
#   build       — next build (with .next/cache restored)
#   test        — vitest run (with v8 coverage) + new-code diff-coverage gate (#1548)
#   invariants  — file size, security `as any` budget, exec-template-literal count,
#                 withApiHandler adoption ratio, twin singleton fan-in
#                 (companion to docs/ARCHITECTURE_INVARIANTS.md)
#   depcruise   — module boundary rules (no lib→app imports, one mutation path,
#                 one renderer, no circular deps outside the known set)
#   semgrep     — security & coupling patterns (executor.exec template literals,
#                 tar extraction bypass, eval/Function, SSRF-prone fetches,
#                 missing withApiHandler)
#
# ANY failure blocks merge. Adoption-ratio floors and per-file ratchets in the
# config files mean today's debt passes — new regressions do not.
#
# Trigger model: PR-first + targeted post-merge `push: main` (#972).
#   - PRs run the full check matrix.
#   - On `push: main`, only the `test` job runs. Direct commits to `main`
#     (this repo allows them; `main` is not branch-protected because of
#     release-please's workflow) bypassed CI entirely under the previous
#     PR-only model — observed live in this session: a direct-to-main
#     commit landed with a doc-sync test that the contributor hadn't
#     re-run locally, and the failure was only caught at the next push's
#     husky hook. A 30-second post-merge test run on `main` catches that
#     class of regression cheaply.
#   - The full check matrix still does NOT run on `push: main` — that
#     would re-validate the same tree as the PR tip for squash-merges
#     (~5 min for no signal). Only `test` runs.
#   - release-please PRs (head_ref `release-please--*`) only touch
#     package.json, CHANGELOG.md, and .release-please-manifest.json;
#     the underlying code was already validated when those PRs were
#     merged. Skipped via job-level `if`.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    if: "${{ github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please--') }}"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Cache node modules
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: node-modules-v2-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit --no-fund
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    if: "${{ github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please--') }}"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Cache node modules
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: node-modules-v2-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit --no-fund
      - run: npx tsc --noEmit

  build:
    runs-on: ubuntu-latest
    if: "${{ github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please--') }}"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Cache node modules
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: node-modules-v2-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit --no-fund
      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.next/cache
          key: nextjs-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            nextjs-${{ hashFiles('package-lock.json') }}-
      - run: npm run build

  test:
    runs-on: ubuntu-latest
    if: "${{ !startsWith(github.head_ref, 'release-please--') }}"
    steps:
      # fetch-depth: 0 so the diff-coverage gate (#1548) can `git merge-base`
      # against the PR base branch — the new-code coverage floor needs the diff.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Cache node modules
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: node-modules-v2-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit --no-fund
      # Full suite WITH v8 coverage. This is the seal/full gate — the autoloop
      # builder's per-issue fast gate stays bare `vitest --changed` (no
      # coverage overhead). Emits coverage/coverage-final.json for the gate.
      - name: Test (with coverage)
        run: npm run test:coverage
      # New-code diff-coverage gate (#1548). Fails the PR when added/modified
      # lines fall below the floor in .diff-coverage.json; untouched legacy
      # code never blocks. On `push: main` there's no base_ref — compare
      # against the previous main tip so a direct-to-main commit is still gated.
      - name: Diff-coverage gate (new code)
        env:
          DIFF_COVERAGE_BASE: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || github.event.before }}
        run: npm run check:diff-coverage

  invariants:
    runs-on: ubuntu-latest
    if: "${{ github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please--') }}"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Cache node modules
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: node-modules-v2-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit --no-fund
      - run: npm run check:invariants

  depcruise:
    runs-on: ubuntu-latest
    if: "${{ github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please--') }}"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Cache node modules
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: node-modules-v2-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit --no-fund
      - run: npm run check:deps

  pytest:
    runs-on: ubuntu-latest
    if: "${{ github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please--') }}"
    # The agent's Python tests (test_agent.py + test_consistency.py) are
    # pure stdlib unittest — no pytest/pip dependency needed. The two
    # empty __init__.py files in v4/ and v4/tests/ exist solely so
    # unittest discover can walk both directories; agent.py itself is
    # shipped as a standalone script (gzipped over SSH, see
    # handler.ts:getAgentScript) so making v4/ a package does not affect
    # production load. tests/templates/test_post_deploy.py is already
    # exercised via vitest subprocess (post_deploy_runtime.test.ts) — no
    # need to duplicate it here.
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Run agent Python tests
        run: python3 -m unittest discover -s packages/backend/src/lib/agent/v4 -p 'test_*.py' -t packages/backend/src/lib/agent/v4 -v

  semgrep:
    runs-on: ubuntu-latest
    if: "${{ github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please--') }}"
    container:
      image: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v6
      # ServiceBay-specific patterns only at first. Each rule in .semgrep.yml
      # has a severity assigned; --severity=ERROR makes only ERROR-tagged
      # findings fail the build (WARNING/INFO are reported but non-blocking).
      # Registry rulesets (p/typescript, p/security-audit) can be enabled
      # additively once the custom baseline is clean — see
      # docs/ARCHITECTURE_INVARIANTS.md.
      - name: Custom ServiceBay rules
        run: semgrep --config .semgrep.yml --severity=ERROR --metrics=off --error .
      - name: Custom rules (informational warnings)
        run: semgrep --config .semgrep.yml --metrics=off . || true
      # Broader registry coverage (#1550). Report-only: the full
      # p/security-audit + p/typescript rulesets surface a wall of findings
      # on day one, so this step is non-blocking (`|| true`) and exists to
      # populate the CI log + give us a triage list. Promote individual
      # findings to blocking incrementally — either fix them, or codify a
      # ServiceBay-specific variant in .semgrep.yml (which the ERROR step
      # above already gates). Mirrors the npm-audit WARNING/ERROR tiering.
      - name: Registry rulesets (report-only — p/security-audit, p/typescript)
        run: semgrep --config p/security-audit --config p/typescript --metrics=off . || true

  # Dependency CVE scan (#1549). Decoupled from the install step — the build/
  # test/lint installs stay `--no-audit` for speed, so a freshly-published
  # advisory can't flakily block every unrelated PR. This job is the single
  # place CVE signal surfaces. Mirrors the semgrep WARNING/ERROR tiering:
  #   - report-only step (always green) surfaces the full advisory list now;
  #   - the blocking step (commented out) ratchets to fail on high/critical
  #     once the baseline is clean — uncomment to flip it on.
  audit:
    runs-on: ubuntu-latest
    if: "${{ github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please--') }}"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: npm audit (report-only)
        run: npm audit --audit-level=high || true
      # Ratchet to blocking once the high/critical baseline is clean:
      # - name: npm audit (blocking on high/critical)
      #   run: npm audit --audit-level=high

  # The Go lifecycle launcher (#1272). Lives in its own module under tools/,
  # outside the npm workspace, so the JS gates above don't touch it — this job
  # is its gate: formatting, vet, build, and unit tests.
  tui-go:
    runs-on: ubuntu-latest
    if: "${{ github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please--') }}"
    defaults:
      run:
        working-directory: tools/sb
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: tools/sb/go.sum
      - name: gofmt
        run: test -z "$(gofmt -l .)" || { echo 'gofmt needed:'; gofmt -l .; exit 1; }
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test
        run: go test ./...
