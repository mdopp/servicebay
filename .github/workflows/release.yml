name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
  push:
    branches:
      - main
      - test

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # On a chore(main): release commit, read the version from package.json
      # so we can emit :X.Y.Z and :X.Y tags. Historically we relied on the
      # `release: published` event to do this, but release-please-action
      # publishes via GITHUB_TOKEN — GitHub's anti-recursion rule means
      # that event never triggers another workflow run. So :X.Y.Z would
      # never get built. Reading the version here closes that gap.
      - name: Read version from package.json (chore release commits only)
        id: pkg
        if: "${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, 'chore(main): release') }}"
        run: |
          VERSION=$(jq -r .version package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "majmin=${VERSION%.*}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},enable=${{ github.event_name == 'release' || startsWith(github.ref, 'refs/tags/') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.event_name == 'release' || startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=${{ steps.pkg.outputs.version }},enable=${{ steps.pkg.outputs.version != '' }}
            type=raw,value=${{ steps.pkg.outputs.majmin }},enable=${{ steps.pkg.outputs.majmin != '' }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' || (github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, 'chore(main): release')) }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, 'chore(main): release') }}
            type=raw,value=test,enable=${{ github.ref == 'refs/heads/test' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

