name: build-images

# Build and publish container images for ServiceBay-owned components.
#
# Heavy batch jobs run as resource-capped worker containers, NOT in the
# servicebay control plane (#1949). The disk-import-worker image is the
# first such worker: servicebay launches it one-shot via
# `podman run --rm --memory=…` and reads only the compact status.json it
# writes. The box pulls this image to run a scan, so it MUST be built and
# published here — otherwise box-verify fails "image not found" (#1953).

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'packages/disk-import-worker/**'
      - 'packages/backup-worker/**'
      - 'packages/api-client/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/workflows/build-images.yml'
  pull_request:
    paths:
      - 'packages/disk-import-worker/**'
      - 'packages/backup-worker/**'
      - '.github/workflows/build-images.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: disk-import-worker
            dockerfile: packages/disk-import-worker/Containerfile
            description: "Resource-capped one-shot disk-import worker (walk/hash/classify/dedup/plan/apply); servicebay launches it via podman run --memory=… and reads its status.json (#1949)."
          - image: backup-worker
            dockerfile: packages/backup-worker/Containerfile
            description: "Resource-capped one-shot config-backup worker (walk/copy/tar each installed service's config per the backup manifest); servicebay launches it via podman run --memory=… and reads its status.json (#1955/#1949)."
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check Dockerfile exists
        id: check
        run: |
          if [ -f "${{ matrix.dockerfile }}" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::${{ matrix.dockerfile }} not present on this ref; skipping ${{ matrix.image }} build."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: steps.check.outputs.exists == 'true' && github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        if: steps.check.outputs.exists == 'true'
        id: meta
        uses: docker/metadata-action@v6
        with:
          # Repo-scoped name so the worker rides the servicebay package namespace,
          # matching the claude-dev image convention (ghcr.io/<owner>/<repo>-<img>).
          images: ghcr.io/${{ github.repository }}-${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build (and push on main/tags)
        if: steps.check.outputs.exists == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          platforms: linux/amd64
