name: build-images

# Build and publish container images for ServiceBay-owned components.
#
# After the OSCAR migration (mdopp/oscar), the oscar-gatekeeper and
# oscar-household-init images moved to mdopp/oscar's own
# .github/workflows/build-images.yml. ServiceBay currently has no
# remaining first-party container images of its own — the workflow
# stays as scaffolding for any future ServiceBay-owned image.

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - '.github/workflows/build-images.yml'
  pull_request:
    paths:
      - '.github/workflows/build-images.yml'

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: ${{ matrix.image }}
    runs-on: ubuntu-latest
    if: false  # no images to build until ServiceBay grows one — see header comment
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: placeholder
            dockerfile: Dockerfile.placeholder
            description: "Placeholder — keeps the workflow valid until ServiceBay ships its own image."
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check Dockerfile exists
        id: check
        run: |
          if [ -f "${{ matrix.dockerfile }}" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::${{ matrix.dockerfile }} not present on this ref; skipping ${{ matrix.image }} build."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: steps.check.outputs.exists == 'true' && github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        if: steps.check.outputs.exists == 'true'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build (and push on main/tags)
        if: steps.check.outputs.exists == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          platforms: linux/amd64
