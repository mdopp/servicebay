apiVersion: v1
kind: Stack
metadata:
  name: home
  annotations:
    servicebay.label: "Home (Home Assistant)"
    servicebay.tier: "feature"
    servicebay.depends-on-stacks: "basic"
  selfHeal:
    home-assistant: env_override
spec:
  # Smart-home stack. The app-specific voice pipeline was retired from
  # ServiceBay in #1876 — Solaris (mdopp/solarisbay) now owns the full
  # voice pipeline. ServiceBay keeps only the generic platform plumbing
  # (GPU/CDI passthrough, hostNetwork carveout, companion-quadlet
  # machinery), which is not voice-specific.
  templates: [home-assistant]
