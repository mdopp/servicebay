apiVersion: v1
kind: Stack
metadata:
  name: household
  annotations:
    servicebay.label: "Household AI Assistant (OSCAR)"
    servicebay.tier: "feature"
    servicebay.depends-on-stacks: "basic"
spec:
  # Bundled templates: Home Assistant (device control), Voice (STT/TTS
  # puck gateway), Ollama (Local LLM), Hermes (Conversational Agent),
  # Oscar Household (Wyoming Bridge + Speaker-ID), Hermes Web UI
  # (Hermes-native family chat at chat.<domain> — replaces the earlier
  # Open WebUI stop-gap from #1030; see #1044 for the why).
  templates: [home-assistant, voice, ollama, hermes, oscar-household, hermes-webui]
