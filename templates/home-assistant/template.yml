apiVersion: v1
kind: Pod
metadata:
  name: home-assistant
  labels:
    app: home-assistant
  annotations:
    servicebay.label: "Smart Home (Home Assistant)"
    servicebay.schema-version: "6"
    # Home Assistant is reached at home.<domain> via nginx, authenticates
    # via Authelia, and talks to Wyoming-protocol STT/TTS on the voice
    # pod (port 10300). Declaring `voice` makes the network map render
    # the dependency even before any TCP flow is sampled.
    servicebay.dependencies: "nginx,auth,voice"
    servicebay.config-mount: "/config"
    servicebay.ports: "8123/tcp,8091/tcp,3001/tcp"
    # Continuous health probe (#628). `/manifest.json` is the PWA
    # manifest — unauthenticated, served once HA's HTTP listener is up.
    # Avoids the /api token requirement of the regular /api endpoint.
    servicebay.healthcheck: |
      url: http://localhost:8123/manifest.json
      interval: 30s
      timeout: 5s
      startup_timeout: 5m
spec:
  hostNetwork: true
  containers:
  # 1. Home Assistant
  - name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    env:
    - name: TZ
      value: "{{TZ}}"
    volumeMounts:
    - mountPath: /config
      name: ha-config
    - mountPath: /run/dbus
      name: dbus
      readOnly: true
    securityContext:
      privileged: true

  # 2. Z-Wave JS UI — always runs (v4 / #422). On installs without a
  # Z-Wave stick the UI starts in "no serial device configured" mode;
  # the operator can plug a stick in later and point the UI at it
  # without rewriting the pod yaml. The device mount + volume below
  # only land when ZWAVE_DEVICE is set so podman doesn't crash-loop
  # on a missing host path.
  - name: zwave-js
    image: ghcr.io/zwave-js/zwave-js-ui:latest
    env:
    - name: TZ
      value: "{{TZ}}"
    - name: SESSION_SECRET
      value: "{{ZWAVE_SECRET}}"
    - name: ZWAVEJS_EXTERNAL_CONFIG
      value: "/usr/src/app/store/.config-db"
    # Pre-seeded by post-deploy on first install: pins serverEnabled=true
    # and serverPort=3001 so the HA → zwave-js websocket binds off port
    # 3000 (which NPM's internal admin backend occupies on the same host
    # under hostNetwork). zwave-js-ui re-reads this file on every boot;
    # overrides anything the operator may set in the UI's "Home Assistant"
    # tab, so deleting the file is the escape hatch for manual control.
    - name: ZWAVE_EXTERNAL_SETTINGS
      value: "/usr/src/app/store/sb-external-settings.json"
    volumeMounts:
    - mountPath: /usr/src/app/store
      name: zwave-config
    {{#ZWAVE_DEVICE}}
    - mountPath: {{ZWAVE_DEVICE}}
      name: zwave-stick
    {{/ZWAVE_DEVICE}}
    securityContext:
      privileged: true

  # 3. Matter Server
  - name: matter-server
    image: ghcr.io/home-assistant-libs/python-matter-server:stable
    env:
    - name: TZ
      value: "{{TZ}}"
    volumeMounts:
    - mountPath: /data
      name: matter-config
    - mountPath: /run/dbus
      name: dbus
      readOnly: true
    securityContext:
      privileged: true

  # Voice services (Faster Whisper, Piper, openWakeWord) live in the
  # separate `voice` template since #348. They listen on the same
  # localhost ports (10300/10200/10400) so HA's voice-pipeline config
  # keeps pointing at `localhost:10300` etc. without changes.

  volumes:
  # Persistence
  - name: ha-config
    hostPath:
      path: {{DATA_DIR}}/home-assistant/homeassistant
      type: DirectoryOrCreate
  - name: zwave-config
    hostPath:
      path: {{DATA_DIR}}/home-assistant/zwave-js
      type: DirectoryOrCreate
  - name: matter-config
    hostPath:
      path: {{DATA_DIR}}/home-assistant/matter-server
      type: DirectoryOrCreate

  # System Mounts
  - name: dbus
    hostPath:
      path: /run/dbus
      type: Directory
  {{#ZWAVE_DEVICE}}
  - name: zwave-stick
    hostPath:
      path: {{ZWAVE_DEVICE}}
      type: CharDevice
  {{/ZWAVE_DEVICE}}
