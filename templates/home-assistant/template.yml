apiVersion: v1
kind: Pod
metadata:
  name: home-assistant
  labels:
    app: home-assistant
  annotations:
    servicebay.label: "Home Assistant"
    servicebay.schema-version: "3"
    servicebay.config-mount: "/config"
    servicebay.ports: "8123/tcp,8091/tcp,3000/tcp"
spec:
  hostNetwork: true
  containers:
  # 1. Home Assistant
  - name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    env:
    - name: TZ
      value: "{{TZ}}"
    volumeMounts:
    - mountPath: /config
      name: ha-config
    - mountPath: /run/dbus
      name: dbus
      readOnly: true
    securityContext:
      privileged: true

  {{#ZWAVE_DEVICE}}
  # 2. Z-Wave JS UI (only when Z-Wave stick is present)
  - name: zwave-js
    image: ghcr.io/zwave-js/zwave-js-ui:latest
    env:
    - name: TZ
      value: "{{TZ}}"
    - name: SESSION_SECRET
      value: "{{ZWAVE_SECRET}}"
    - name: ZWAVEJS_EXTERNAL_CONFIG
      value: "/usr/src/app/store/.config-db"
    volumeMounts:
    - mountPath: /usr/src/app/store
      name: zwave-config
    - mountPath: /dev/serial-device
      name: zwave-stick
    securityContext:
      privileged: true
  {{/ZWAVE_DEVICE}}

  # 3. Matter Server
  - name: matter-server
    image: ghcr.io/home-assistant-libs/python-matter-server:stable
    env:
    - name: TZ
      value: "{{TZ}}"
    volumeMounts:
    - mountPath: /data
      name: matter-config
    - mountPath: /run/dbus
      name: dbus
      readOnly: true
    securityContext:
      privileged: true

  # Voice services (Faster Whisper, Piper, openWakeWord) live in the
  # separate `voice` template since #348. They listen on the same
  # localhost ports (10300/10200/10400) so HA's voice-pipeline config
  # keeps pointing at `localhost:10300` etc. without changes.

  volumes:
  # Persistence
  - name: ha-config
    hostPath:
      path: {{DATA_DIR}}/home-assistant/homeassistant
      type: DirectoryOrCreate
  {{#ZWAVE_DEVICE}}
  - name: zwave-config
    hostPath:
      path: {{DATA_DIR}}/home-assistant/zwave-js
      type: DirectoryOrCreate
  {{/ZWAVE_DEVICE}}
  - name: matter-config
    hostPath:
      path: {{DATA_DIR}}/home-assistant/matter-server
      type: DirectoryOrCreate

  # System Mounts
  - name: dbus
    hostPath:
      path: /run/dbus
      type: Directory
  {{#ZWAVE_DEVICE}}
  - name: zwave-stick
    hostPath:
      path: {{ZWAVE_DEVICE}}
      type: CharDevice
  {{/ZWAVE_DEVICE}}
