apiVersion: v1
kind: Pod
metadata:
  name: home-assistant
  labels:
    app: home-assistant
  annotations:
    servicebay.label: "Home Assistant"
    servicebay.schema-version: "4"
    # Home Assistant is reached at home.<domain> via nginx, and (when
    # the operator enables it) authenticates via Authelia.
    servicebay.dependencies: "nginx,auth"
    servicebay.config-mount: "/config"
    servicebay.ports: "8123/tcp,8091/tcp,3001/tcp"
spec:
  hostNetwork: true
  containers:
  # 1. Home Assistant
  - name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    env:
    - name: TZ
      value: "{{TZ}}"
    volumeMounts:
    - mountPath: /config
      name: ha-config
    - mountPath: /run/dbus
      name: dbus
      readOnly: true
    securityContext:
      privileged: true

  # 2. Z-Wave JS UI — always runs (v4 / #422). On installs without a
  # Z-Wave stick the UI starts in "no serial device configured" mode;
  # the operator can plug a stick in later and point the UI at it
  # without rewriting the pod yaml. The device mount + volume below
  # only land when ZWAVE_DEVICE is set so podman doesn't crash-loop
  # on a missing host path.
  - name: zwave-js
    image: ghcr.io/zwave-js/zwave-js-ui:latest
    env:
    - name: TZ
      value: "{{TZ}}"
    - name: SESSION_SECRET
      value: "{{ZWAVE_SECRET}}"
    - name: ZWAVEJS_EXTERNAL_CONFIG
      value: "/usr/src/app/store/.config-db"
    volumeMounts:
    - mountPath: /usr/src/app/store
      name: zwave-config
    {{#ZWAVE_DEVICE}}
    - mountPath: {{ZWAVE_DEVICE}}
      name: zwave-stick
    {{/ZWAVE_DEVICE}}
    securityContext:
      privileged: true

  # 3. Matter Server
  - name: matter-server
    image: ghcr.io/home-assistant-libs/python-matter-server:stable
    env:
    - name: TZ
      value: "{{TZ}}"
    volumeMounts:
    - mountPath: /data
      name: matter-config
    - mountPath: /run/dbus
      name: dbus
      readOnly: true
    securityContext:
      privileged: true

  # Voice services (Faster Whisper, Piper, openWakeWord) live in the
  # separate `voice` template since #348. They listen on the same
  # localhost ports (10300/10200/10400) so HA's voice-pipeline config
  # keeps pointing at `localhost:10300` etc. without changes.

  volumes:
  # Persistence
  - name: ha-config
    hostPath:
      path: {{DATA_DIR}}/home-assistant/homeassistant
      type: DirectoryOrCreate
  - name: zwave-config
    hostPath:
      path: {{DATA_DIR}}/home-assistant/zwave-js
      type: DirectoryOrCreate
  - name: matter-config
    hostPath:
      path: {{DATA_DIR}}/home-assistant/matter-server
      type: DirectoryOrCreate

  # System Mounts
  - name: dbus
    hostPath:
      path: /run/dbus
      type: Directory
  {{#ZWAVE_DEVICE}}
  - name: zwave-stick
    hostPath:
      path: {{ZWAVE_DEVICE}}
      type: CharDevice
  {{/ZWAVE_DEVICE}}
