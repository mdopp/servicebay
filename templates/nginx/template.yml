apiVersion: v1
kind: Pod
metadata:
  name: nginx
  labels:
    app: nginx
    servicebay.role: reverse-proxy
  annotations:
    servicebay.label: "Nginx Proxy Manager"
    servicebay.schema-version: "3"
    servicebay.tier: "infrastructure"
    servicebay.ports: "{{NGINX_PORT}}/tcp,{{NGINX_SSL_PORT}}/tcp,{{NGINX_ADMIN_PORT}}/tcp"
    # Readiness probe (#613). Every "behind NPM" template depends on
    # nginx and seeds a proxy host in its post-deploy — the admin API
    # must be answering before that fires. NPM's `/api/tokens` POST
    # runs joi schema validation BEFORE auth, so it returns 400 when
    # `identity` isn't a valid email format and 401 when the format
    # validates but auth fails. Either response proves the API is live;
    # earlier in startup the listener returns 502 / connection-refused
    # / 5xx, which the probe keeps waiting on. The retry loop in
    # `src/lib/stackInstall/postInstall.ts` still handles the case
    # where NPM rejects ServiceBay's wizard-generated credentials.
    servicebay.readiness: |
      - kind: http
        url: http://localhost:{{NGINX_ADMIN_PORT}}/api/tokens
        method: POST
        body: '{"identity":"probe@servicebay.local","secret":"x"}'
        expect_status: [400, 401]
        timeout: 5m
spec:
  hostNetwork: true
  containers:
  - name: nginx-proxy-manager
    image: docker.io/jc21/nginx-proxy-manager:latest
    env:
    - name: INITIAL_ADMIN_EMAIL
      value: "{{NGINX_ADMIN_EMAIL}}"
    - name: INITIAL_ADMIN_PASSWORD
      value: "{{NGINX_ADMIN_PASSWORD}}"
    # `hostPort:` is invalid under hostNetwork — podman rejects it with
    # "PortMappings can only be used with Bridge, slirp4netns, or pasta
    # networking" and the pod crash-loops. Under hostNetwork the container
    # binds {{NGINX_PORT}}/{{NGINX_SSL_PORT}}/{{NGINX_ADMIN_PORT}} directly
    # on the host; the servicebay.ports annotation above carries the port
    # list for the UI / network graph. The NPM image listens on 80/443/81
    # internally, so the operator's chosen values only work as-is when
    # they match those defaults.
    ports:
    - containerPort: {{NGINX_PORT}}
    - containerPort: {{NGINX_SSL_PORT}}
    - containerPort: {{NGINX_ADMIN_PORT}}
    volumeMounts:
    - mountPath: /data
      name: npm-data
    - mountPath: /etc/letsencrypt
      name: npm-letsencrypt
  volumes:
  - name: npm-data
    hostPath:
      path: {{DATA_DIR}}/nginx-proxy-manager/data
      type: DirectoryOrCreate
  - name: npm-letsencrypt
    hostPath:
      path: {{DATA_DIR}}/nginx-proxy-manager/letsencrypt
      type: DirectoryOrCreate
