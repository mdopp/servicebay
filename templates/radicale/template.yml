apiVersion: v1
kind: Pod
metadata:
  name: radicale
  labels:
    app: radicale
  annotations:
    servicebay.label: "Radicale (CalDAV + CardDAV)"
    servicebay.ports: "{{RADICALE_PORT}}/tcp"
spec:
  hostNetwork: true
  initContainers:
  # Seed /config/config in-pod, every deploy. Earlier versions wrote a
  # config.mustache to the host bind-mount during the wizard's deploy
  # step, which was fragile: any failure in the wizard's path resolver
  # or the agent's write_file call left radicale starting with no config
  # and crash-looping with `[Errno 2] /config/config not found`. By
  # carrying the rendered config inside the pod manifest itself, every
  # `podman play kube` re-creates it deterministically — there's
  # nothing host-side that can drift.
  - name: write-config
    image: docker.io/busybox:latest
    command: ["/bin/sh", "-c"]
    args:
      - |
        cat > /config/config <<'EOF'
        [server]
        hosts = 0.0.0.0:{{RADICALE_PORT}}
        max_connections = 20
        max_content_length = 100000000

        [encoding]
        request = utf-8
        stock = utf-8

        [auth]
        type = ldap
        ldap_uri = ldap://{{LLDAP_HOST}}:{{LLDAP_LDAP_PORT}}
        ldap_base = ou=people,{{LLDAP_BASE_DN}}
        ldap_reader_dn = uid=admin,ou=people,{{LLDAP_BASE_DN}}
        ldap_secret = {{LLDAP_ADMIN_PASSWORD}}
        ldap_filter = (&(objectClass=person)(uid={0}))
        ldap_user_attribute = uid

        [storage]
        type = multifilesystem
        filesystem_folder = /data/collections

        [rights]
        type = owner_only

        [web]
        type = internal

        [logging]
        level = info
        EOF
    volumeMounts:
      - mountPath: /config
        name: radicale-config
  containers:
  - name: radicale
    image: docker.io/tomsquest/docker-radicale:latest
    # We DO NOT override command: or args:. Each previous attempt to do
    # so broke differently:
    #   PR #164  command:[dumb-init,--,radicale] → "dumb-init not found
    #            in PATH" (K8s command: doesn't carry the image's PATH).
    #   PR #178  args:[radicale,--config=…]      → "radicale: not found"
    #            (entrypoint.sh's PATH excludes the user-pip install loc).
    #
    # The image's full default chain is
    #   dumb-init -- /usr/local/bin/entrypoint.sh radicale
    # which Just Works because the image was built with the right PATH
    # and the right user. Don't fight it. Pass the config path via env
    # var instead — radicale reads RADICALE_CONFIG natively.
    env:
      - name: RADICALE_CONFIG
        value: /config/config
    ports:
      - containerPort: {{RADICALE_PORT}}
    volumeMounts:
      - mountPath: /data
        name: radicale-data
      - mountPath: /config
        name: radicale-config
        readOnly: true
  volumes:
  - name: radicale-data
    hostPath:
      path: {{DATA_DIR}}/radicale/data
      type: DirectoryOrCreate
  # /config is an in-pod ephemeral volume populated by the initContainer
  # on every deploy. Radicale's runtime state lives on /data (host bind
  # mount above), so nothing important is lost when /config is recreated.
  - name: radicale-config
    emptyDir: {}
