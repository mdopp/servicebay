apiVersion: v1
kind: Pod
metadata:
  name: immich
  labels:
    app: immich
  annotations:
    servicebay.label: "Immich (Photos)"
    servicebay.schema-version: "2"
    servicebay.ports: "{{IMMICH_PORT}}/tcp"
    # photos.<domain> is served via nginx; Immich's SSO uses Authelia.
    servicebay.dependencies: "nginx,auth"
    # Continuous health probe (#628). `/api/server/ping` is Immich's
    # unauthenticated liveness endpoint — returns `{"res":"pong"}`.
    # (Pre-v2.7 this lived at `/api/server-info/ping`; the old path now
    # 404s, which made the probe report Immich permanently unhealthy.)
    servicebay.healthcheck: |
      url: http://localhost:{{IMMICH_PORT}}/api/server/ping
      interval: 30s
      timeout: 5s
      startup_timeout: 5m
spec:
  # #817: Immich runs in its own network namespace (no hostNetwork).
  #   - Only `immich-server` is published to the host, via `hostPort`
  #     below. redis / postgres / machine-learning stay pod-internal —
  #     the four containers share the pod's netns, so the `127.0.0.1`
  #     references between them (DB_HOSTNAME, REDIS_HOSTNAME,
  #     IMMICH_MACHINE_LEARNING_URL) keep working unchanged, and the
  #     loopback binds below mean the sidecars are never LAN-reachable.
  #   - Immich does *server-side* OIDC discovery against
  #     https://auth.<PUBLIC_DOMAIN>; an isolated container's resolver
  #     doesn't apply AdGuard's `*.PUBLIC_DOMAIN → LAN IP` rewrite
  #     (#408/#410), so the `hostAliases` entry pins that name to the
  #     LAN IP — request flows container → LAN IP → NPM → Authelia.
  #     {{LAN_IP}} is filled in by the install runner at deploy time.
  hostAliases:
    - ip: "{{LAN_IP}}"
      hostnames:
        - "auth.{{PUBLIC_DOMAIN}}"
  containers:
    - name: immich-server
      image: ghcr.io/immich-app/immich-server:release
      env:
        # immich-server binds {{IMMICH_PORT}} inside the pod netns;
        # the `hostPort` on the container port below publishes it.
        - name: IMMICH_PORT
          value: "{{IMMICH_PORT}}"
        - name: DB_HOSTNAME
          value: "127.0.0.1"
        - name: DB_USERNAME
          value: "postgres"
        - name: DB_PASSWORD
          value: "{{DB_PASSWORD}}"
        - name: DB_DATABASE_NAME
          value: "immich"
        - name: REDIS_HOSTNAME
          value: "127.0.0.1"
        - name: IMMICH_MACHINE_LEARNING_URL
          value: "http://127.0.0.1:3003"
      ports:
        - containerPort: {{IMMICH_PORT}}
          hostPort: {{IMMICH_PORT}}
      volumeMounts:
        - mountPath: /usr/src/app/upload
          name: immich-upload

    - name: immich-machine-learning
      image: ghcr.io/immich-app/immich-machine-learning:release
      volumeMounts:
        - mountPath: /cache
          name: model-cache

    - name: redis
      image: docker.io/redis:6.2-alpine
      # Bind redis to the pod loopback — immich-server reaches it via
      # 127.0.0.1 (same pod netns); never LAN-reachable. No `ports:` —
      # redis is pod-internal, so it's published nowhere on the host
      # (#817: a declared port with no hostPort is now a consistency
      # error, and a hostPort would wrongly LAN-expose it).
      args: ["--bind", "127.0.0.1", "--protected-mode", "yes"]

    - name: database
      image: docker.io/tensorchord/pgvecto-rs:pg14-v0.2.0
      # The pgvecto-rs image's default CMD sets
      # `shared_preload_libraries=vectors.so` — overriding args to
      # restrict listen_addresses dropped that, postgres started
      # without the extension and immich's microservices worker
      # crashed with "pgvecto.rs must be loaded via
      # shared_preload_libraries" (#410 follow-up). Keep BOTH
      # `-c` flags: extension load AND localhost-only bind.
      args:
        - "postgres"
        - "-c"
        - "shared_preload_libraries=vectors.so"
        - "-c"
        - "listen_addresses=127.0.0.1"
      env:
        - name: POSTGRES_PASSWORD
          value: "{{DB_PASSWORD}}"
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_DB
          value: "immich"
      # No `ports:` — postgres is pod-internal (immich-server reaches
      # it on the pod loopback), published nowhere on the host (#817).
      volumeMounts:
        - mountPath: /var/lib/postgresql/data
          name: pgdata

  volumes:
    - name: immich-upload
      hostPath:
        path: {{DATA_DIR}}/immich/upload
        type: DirectoryOrCreate
    - name: model-cache
      hostPath:
        path: {{DATA_DIR}}/immich/model-cache
        type: DirectoryOrCreate
    - name: pgdata
      hostPath:
        path: {{DATA_DIR}}/immich/pgdata
        type: DirectoryOrCreate
