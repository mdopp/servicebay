apiVersion: v1
kind: Pod
metadata:
  name: immich
  labels:
    app: immich
  annotations:
    servicebay.label: "Photos"
    servicebay.schema-version: "3"
    servicebay.ports: "{{IMMICH_PORT}}/tcp"
    # photos.<domain> is served via nginx; Immich's SSO uses Authelia.
    # file-share supplies the read-only photo areas for the disk-import
    # External Libraries (#1904) — its data root is mounted below.
    servicebay.dependencies: "nginx,auth,file-share"
    # Continuous health probe (#628). `/api/server/ping` is Immich's
    # unauthenticated liveness endpoint — returns `{"res":"pong"}`.
    # (Pre-v2.7 this lived at `/api/server-info/ping`; the old path now
    # 404s, which made the probe report Immich permanently unhealthy.)
    servicebay.healthcheck: |
      url: http://localhost:{{IMMICH_PORT}}/api/server/ping
      interval: 30s
      timeout: 5s
      startup_timeout: 5m
    # Disable SELinux relabelling on immich-server's bind mounts. The
    # `photo-areas` hostPath points at /mnt/data/stacks/file-share/data —
    # a SHARED, multi-writer tree already consumed by samba, syncthing,
    # filebrowser, and disk-import. The default `kube play` recursive
    # relabel walks that whole tree calling `lsetxattr` on every entry.
    # Files written by other consumers (e.g. `sudo`-owned disk-import
    # entries) can't be relabelled by the rootless `core` user →
    # "operation not permitted" → exit 125 crash-loop on every start
    # (observed on box verify of #1918, audiobooks/book01.m4b blocked it).
    # The shared tree already carries `container_file_t` from its other
    # long-lived consumers, so Immich's read-only mount needs no relabel.
    # Same per-container disable pattern as media/jellyfin (#1731) and
    # file-share/samba/syncthing/filebrowser. (cf.
    # feedback_hermes_config_bak_selinux: a root-owned stray in a shared
    # tree is a relabel footgun.)
    io.podman.annotations.label/immich-server: "disable"
spec:
  # #817: Immich runs in its own network namespace (no hostNetwork).
  #   - Only `immich-server` is published to the host, via `hostPort`
  #     below. redis / postgres / machine-learning stay pod-internal —
  #     the four containers share the pod's netns, so the `127.0.0.1`
  #     references between them (DB_HOSTNAME, REDIS_HOSTNAME,
  #     IMMICH_MACHINE_LEARNING_URL) keep working unchanged, and the
  #     loopback binds below mean the sidecars are never LAN-reachable.
  #   - Immich does *server-side* OIDC discovery against
  #     https://auth.<PUBLIC_DOMAIN>; an isolated container's resolver
  #     doesn't apply AdGuard's `*.PUBLIC_DOMAIN → LAN IP` rewrite
  #     (#408/#410), so the `hostAliases` entry pins that name to a
  #     host-reachable IP. It must be HOST_GATEWAY_IP (podman's
  #     `host.containers.internal`), NOT the host's LAN IP — a
  #     rootless-podman pod can't reach the host's own LAN IP (#817).
  #     The request flows container → host → NPM → Authelia; the
  #     canonical `auth.<PUBLIC_DOMAIN>` name is preserved so the OIDC
  #     issuer still validates.
  hostAliases:
    - ip: "{{HOST_GATEWAY_IP}}"
      hostnames:
        - "auth.{{PUBLIC_DOMAIN}}"
  containers:
    - name: immich-server
      image: ghcr.io/immich-app/immich-server:release
      env:
        # immich-server binds {{IMMICH_PORT}} inside the pod netns;
        # the `hostPort` on the container port below publishes it.
        - name: IMMICH_PORT
          value: "{{IMMICH_PORT}}"
        - name: DB_HOSTNAME
          value: "127.0.0.1"
        - name: DB_USERNAME
          value: "postgres"
        - name: DB_PASSWORD
          value: "{{DB_PASSWORD}}"
        - name: DB_DATABASE_NAME
          value: "immich"
        - name: REDIS_HOSTNAME
          value: "127.0.0.1"
        - name: IMMICH_MACHINE_LEARNING_URL
          value: "http://127.0.0.1:3003"
      ports:
        - containerPort: {{IMMICH_PORT}}
          hostPort: {{IMMICH_PORT}}
      volumeMounts:
        - mountPath: /usr/src/app/upload
          name: immich-upload
        # #1904: the file-share data root, mounted READ-ONLY, so Immich can
        # index the disk-import photo areas via per-user External Libraries
        # (`/mnt/photos/<user>/photos`) + a shared one (`/mnt/photos/photos`).
        # Read-only by design — curation/deletion happens on the filesystem,
        # never from within Immich (accepted trade-off, Decision A). The path
        # must match IMMICH_EXTERNAL_MOUNT in lib/diskImport/immichLibraries.ts.
        - mountPath: /mnt/photos
          name: photo-areas
          readOnly: true

    - name: immich-machine-learning
      image: ghcr.io/immich-app/immich-machine-learning:release
      volumeMounts:
        - mountPath: /cache
          name: model-cache

    - name: redis
      image: docker.io/redis:6.2-alpine
      # Bind redis to the pod loopback — immich-server reaches it via
      # 127.0.0.1 (same pod netns); never LAN-reachable. No `ports:` —
      # redis is pod-internal, so it's published nowhere on the host
      # (#817: a declared port with no hostPort is now a consistency
      # error, and a hostPort would wrongly LAN-expose it).
      args: ["--bind", "127.0.0.1", "--protected-mode", "yes"]

    - name: database
      image: docker.io/tensorchord/pgvecto-rs:pg14-v0.2.0
      # The pgvecto-rs image's default CMD sets
      # `shared_preload_libraries=vectors.so` — overriding args to
      # restrict listen_addresses dropped that, postgres started
      # without the extension and immich's microservices worker
      # crashed with "pgvecto.rs must be loaded via
      # shared_preload_libraries" (#410 follow-up). Keep BOTH
      # `-c` flags: extension load AND localhost-only bind.
      args:
        - "postgres"
        - "-c"
        - "shared_preload_libraries=vectors.so"
        - "-c"
        - "listen_addresses=127.0.0.1"
      env:
        - name: POSTGRES_PASSWORD
          value: "{{DB_PASSWORD}}"
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_DB
          value: "immich"
      # No `ports:` — postgres is pod-internal (immich-server reaches
      # it on the pod loopback), published nowhere on the host (#817).
      volumeMounts:
        - mountPath: /var/lib/postgresql/data
          name: pgdata

  volumes:
    - name: immich-upload
      hostPath:
        path: {{DATA_DIR}}/immich/upload
        type: DirectoryOrCreate
    # #1904: file-share's data root (the per-user `data/<user>/photos` + shared
    # `data/photos` photo areas live under here). Mounted read-only into
    # immich-server above. DirectoryOrCreate so a box without file-share data
    # yet still starts; the External Libraries simply index nothing until photos
    # land. file-share is declared in servicebay.dependencies so it installs first.
    - name: photo-areas
      hostPath:
        path: {{DATA_DIR}}/file-share/data
        type: DirectoryOrCreate
    - name: model-cache
      hostPath:
        path: {{DATA_DIR}}/immich/model-cache
        type: DirectoryOrCreate
    - name: pgdata
      hostPath:
        path: {{DATA_DIR}}/immich/pgdata
        type: DirectoryOrCreate
