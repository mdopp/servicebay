apiVersion: v1
kind: Pod
metadata:
  name: voice
  labels:
    app: voice
  annotations:
    servicebay.label: "Smart Home Voice Assist"
    servicebay.schema-version: "2"
    # No `servicebay.tier` — voice is optional plumbing, not platform
    # infrastructure (DNS / proxy / SSO are tier=infrastructure and
    # auto-included by the wizard; voice should be opt-in). The pod
    # is hidden from the family portal anyway because it ships no
    # user-guide.md (the portal-card builder only includes templates
    # that declare one).
    servicebay.ports: "10300/tcp,10200/tcp,10400/tcp"
    # Continuous health probe (#628). Wyoming protocol is binary-over-TCP,
    # no HTTP; a successful TCP connect to Whisper's port proves the
    # primary speech-to-text service is up. Whisper runs as the companion
    # `voice-whisper.container` Quadlet (written by post-deploy.py, #1809)
    # — probing ITS port from the pod's healthcheck is deliberate: voice
    # is not healthy without STT, wherever it runs.
    servicebay.healthcheck: |
      kind: tcp
      host: localhost
      port: 10300
      interval: 30s
      timeout: 5s
      startup_timeout: 5m
spec:
  # hostNetwork so other pods (Home Assistant primarily) reach the
  # Wyoming endpoints at localhost on the standard ports — keeping the
  # existing HA voice-pipeline configuration working without changes
  # after the split from #348.
  hostNetwork: true
  containers:
  # 1. Faster Whisper (speech-to-text) does NOT live in this pod (#1809):
  #    it needs the GPU on CUDA-capable boxes, `podman kube play` silently
  #    drops CDI device requests (#1026), and `privileged: true` exposes
  #    /dev but not the host driver libraries (box-verified: "CUDA driver
  #    version is insufficient"). post-deploy.py writes a companion
  #    `voice-whisper.container` Quadlet instead — GPU image with
  #    AddDevice=nvidia.com/gpu=all when CDI is registered, the CPU image
  #    otherwise. Same Wyoming endpoint either way: tcp://localhost:10300.

  # 2. Piper — text-to-speech via Wyoming protocol
  - name: piper
    image: docker.io/rhasspy/wyoming-piper:latest
    args:
    - --voice
    - "{{PIPER_VOICE}}"
    - --data-dir
    - /data
    - --uri
    - tcp://0.0.0.0:10200
    volumeMounts:
    - mountPath: /data
      name: piper-data

  # 3. openWakeWord — wake-word detection via Wyoming protocol
  - name: openwakeword
    image: docker.io/rhasspy/wyoming-openwakeword:latest
    args:
    - --uri
    - tcp://0.0.0.0:10400
    # Optional custom wake-word models (#1832). When the operator sets
    # OPENWAKEWORD_CUSTOM_MODELS_DIR, the host path is mounted at
    # /custom_models and wyoming-openwakeword scans it for .tflite models,
    # which then show up as selectable wake words in Home Assistant. Empty
    # by default → this section renders to nothing, so CPU/stock-model-only
    # boxes are unaffected (same conditional pattern as HA's ZWAVE_DEVICE).
    {{#OPENWAKEWORD_CUSTOM_MODELS_DIR}}
    - --custom-model-dir
    - /custom_models
    {{/OPENWAKEWORD_CUSTOM_MODELS_DIR}}
    {{#OPENWAKEWORD_CUSTOM_MODELS_DIR}}
    volumeMounts:
    - mountPath: /custom_models
      name: openwakeword-custom-models
    {{/OPENWAKEWORD_CUSTOM_MODELS_DIR}}

  volumes:
  - name: piper-data
    hostPath:
      path: {{DATA_DIR}}/voice/piper
      type: DirectoryOrCreate
  {{#OPENWAKEWORD_CUSTOM_MODELS_DIR}}
  - name: openwakeword-custom-models
    hostPath:
      path: {{OPENWAKEWORD_CUSTOM_MODELS_DIR}}
      type: DirectoryOrCreate
  {{/OPENWAKEWORD_CUSTOM_MODELS_DIR}}
