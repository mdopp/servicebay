apiVersion: v1
kind: Pod
metadata:
  name: filebrowser
  labels:
    app: filebrowser
  annotations:
    servicebay.ports: "{{FILEBROWSER_PORT}}/tcp"
    servicebay.config-mount: /config
spec:
  hostNetwork: true
  containers:
  - name: filebrowser
    image: docker.io/filebrowser/filebrowser:latest
    # Run as container UID 0. Under rootless podman that maps to the host
    # user running podman (e.g. `core`/uid 1000), which owns the hostPath
    # dirs we mount below. Without this override the filebrowser image's
    # default non-root user maps to a sub-UID that has no write access on
    # the host directories, causing the entrypoint's seed-config `cp` to
    # fail with "Permission denied" in a tight restart loop. There's no
    # security regression — rootless containers' "root" is already the
    # unprivileged host user.
    securityContext:
      runAsUser: 0
      runAsGroup: 0
    # Bind to loopback only — Authelia forward-auth at the NPM layer is
    # the gate. Direct host-IP access on this port is intentionally
    # unreachable so a misconfigured proxy can't accidentally expose an
    # unauth-allowing service.
    args:
      - "--config=/config/.filebrowser.json"
      - "--database=/database/filebrowser.db"
      - "--root=/srv"
      - "--address=127.0.0.1"
      - "--port={{FILEBROWSER_PORT}}"
    # Declare the listening port so the agent surfaces it in the service's
    # `ports[]` and the network map can match the proxy_pass route to this
    # service. Host network = the containerPort is also the host port.
    # Without this the `servicebay.ports` annotation alone is decorative.
    ports:
      - containerPort: {{FILEBROWSER_PORT}}
    volumeMounts:
      - mountPath: /srv
        name: shared-data
      - mountPath: /database
        name: filebrowser-db
      - mountPath: /config
        name: filebrowser-config
  volumes:
  - name: shared-data
    hostPath:
      path: {{DATA_DIR}}/file-share/data
      type: DirectoryOrCreate
  - name: filebrowser-db
    hostPath:
      path: {{DATA_DIR}}/filebrowser/db
      type: DirectoryOrCreate
  - name: filebrowser-config
    hostPath:
      path: {{DATA_DIR}}/filebrowser/config
      type: DirectoryOrCreate
