apiVersion: v1
kind: Pod
metadata:
  name: adguard
  labels:
    app: adguard
    servicebay.role: dns
spec:
  hostNetwork: true
  containers:
  - name: adguard-home
    image: docker.io/adguard/adguardhome:latest
    ports:
    - containerPort: 8083
      hostPort: 8083
    - containerPort: 53
      hostPort: 53
      protocol: udp
    - containerPort: 53
      hostPort: 53
      protocol: tcp
    volumeMounts:
    - mountPath: /opt/adguardhome/work
      name: adguard-work
    - mountPath: /opt/adguardhome/conf
      name: adguard-conf
  volumes:
  - name: adguard-work
    hostPath:
      path: {{DATA_DIR}}/adguard/work
      type: DirectoryOrCreate
  - name: adguard-conf
    hostPath:
      path: {{DATA_DIR}}/adguard/conf
      type: DirectoryOrCreate
