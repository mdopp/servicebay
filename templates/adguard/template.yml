apiVersion: v1
kind: Pod
metadata:
  name: adguard
  labels:
    app: adguard
    servicebay.role: dns
  annotations:
    servicebay.label: "AdGuard Home (DNS)"
    servicebay.schema-version: "1"
    servicebay.tier: "infrastructure"
    servicebay.ports: "{{ADGUARD_ADMIN_PORT}}/tcp,53/udp,53/tcp"
    servicebay.config-mount: /opt/adguardhome/conf
spec:
  hostNetwork: true
  containers:
  - name: adguard-home
    image: docker.io/adguard/adguardhome:latest
    ports:
      - containerPort: {{ADGUARD_ADMIN_PORT}}
      - containerPort: 53
        protocol: UDP
      - containerPort: 53
        protocol: TCP
    volumeMounts:
    - mountPath: /opt/adguardhome/work
      name: adguard-work
    - mountPath: /opt/adguardhome/conf
      name: adguard-conf
  volumes:
  - name: adguard-work
    hostPath:
      path: {{DATA_DIR}}/adguard/work
      type: DirectoryOrCreate
  - name: adguard-conf
    hostPath:
      path: {{DATA_DIR}}/adguard/conf
      type: DirectoryOrCreate
