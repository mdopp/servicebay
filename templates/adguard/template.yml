apiVersion: v1
kind: Pod
metadata:
  name: adguard
  labels:
    app: adguard
    servicebay.role: dns
  annotations:
    servicebay.label: "Ad Blocker (DNS)"
    servicebay.schema-version: "2"
    servicebay.tier: "infrastructure"
    # NPM proxies `<ADGUARD_SUBDOMAIN>.<PUBLIC_DOMAIN>` through Authelia
    # forward-auth, so the auth pod must exist before this template's
    # proxy host is created — without the gate the admin UI sits open.
    servicebay.dependencies: "nginx,auth"
    servicebay.ports: "{{ADGUARD_ADMIN_PORT}}/tcp,53/udp,53/tcp"
    servicebay.config-mount: /opt/adguardhome/conf
    # Continuous health probe (#626). AdGuard's `/control/*` API requires
    # authentication once the admin password is set — and the post-deploy
    # sets it — so `/control/status` returns 401 to the unauthenticated
    # poller and can never go ready (#827: it was one of the two services
    # that left settle-wait stuck at 10/12). `/login.html` is the static
    # login page AdGuard always serves unauthenticated; a 200 there
    # confirms the admin listener is alive.
    servicebay.healthcheck: |
      url: http://localhost:{{ADGUARD_ADMIN_PORT}}/login.html
      interval: 30s
      timeout: 5s
      startup_timeout: 5m
spec:
  hostNetwork: true
  containers:
  - name: adguard-home
    image: docker.io/adguard/adguardhome:latest
    ports:
      - containerPort: {{ADGUARD_ADMIN_PORT}}
      - containerPort: 53
        protocol: UDP
      - containerPort: 53
        protocol: TCP
    volumeMounts:
    - mountPath: /opt/adguardhome/work
      name: adguard-work
    - mountPath: /opt/adguardhome/conf
      name: adguard-conf
  volumes:
  - name: adguard-work
    hostPath:
      path: {{DATA_DIR}}/adguard/work
      type: DirectoryOrCreate
  - name: adguard-conf
    hostPath:
      path: {{DATA_DIR}}/adguard/conf
      type: DirectoryOrCreate
