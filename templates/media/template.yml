apiVersion: v1
kind: Pod
metadata:
  name: media
  labels:
    app: media
    servicebay.role: media
  annotations:
    servicebay.label: "Movies & TV"
    servicebay.schema-version: "5"
    # Jellyfin's public URL routes through nginx, and its LDAP-Auth
    # plugin binds LLDAP from the `auth` stack — both prerequisites.
    # (#1725: Audiobookshelf retired for fresh installs; audiobooks are
    # served by Jellyfin's /media/audiobooks library now.)
    servicebay.dependencies: "nginx,auth"
    servicebay.ports: "{{JELLYFIN_PORT}}/tcp"
    # Continuous health probe (#628). Jellyfin's /System/Info/Public
    # returns 200 once the server is up; it's the only container in the
    # pod now, so pod-up == Jellyfin-up. #618's UserManager-init race is
    # gated by post-deploy.py's own retry loop, not by this probe.
    servicebay.healthcheck: |
      url: http://localhost:{{JELLYFIN_PORT}}/System/Info/Public
      interval: 30s
      timeout: 5s
      startup_timeout: 5m
spec:
  # #817: Media runs in its own network namespace (no hostNetwork) so a
  # compromised jellyfin container can't reach the host's other service
  # ports or the ServiceBay control API.
  #   - Jellyfin is published to the host via `hostPort` on its container
  #     port below; nothing else in the pod is LAN-reachable.
  #   - The `hostAliases` entry pins auth.<PUBLIC_DOMAIN> to
  #     HOST_GATEWAY_IP (podman's `host.containers.internal`) so any
  #     server-side call to Authelia from inside the pod resolves —
  #     an isolated container's resolver doesn't apply AdGuard's
  #     `*.PUBLIC_DOMAIN → LAN IP` rewrite, and a rootless-podman pod
  #     can't reach the host's own LAN IP (#817).
  #   - post-deploy.py runs in the host netns (not the pod), so its
  #     `127.0.0.1:9091` Authelia probe and `127.0.0.1:<JELLYFIN_PORT>`
  #     Jellyfin probe keep working — the latter via the hostPort.
  #   - #1725: Audiobookshelf retired for fresh installs. An upgrade from
  #     an older media install leaves the existing ABS container + its
  #     {{DATA_DIR}}/media/audiobookshelf-* data dirs untouched on disk;
  #     this pod simply no longer (re)starts ABS. Audiobooks are served
  #     by Jellyfin's /media/audiobooks library (registered in
  #     post-deploy.py).
  hostAliases:
    - ip: "{{HOST_GATEWAY_IP}}"
      hostnames:
        - "auth.{{PUBLIC_DOMAIN}}"
  containers:
  # Jellyfin — Music + audiobooks + (future) video, with Quick Connect for
  #    Symfonium/Findroid/Streamyfin etc. Quick Connect is the practical
  #    SSO answer for Subsonic-style apps: web-confirm a 6-digit code
  #    that the mobile app shows, no shared passwords. Web-UI itself
  #    runs against Jellyfin's own user DB by default — operators can
  #    install jellyfin-plugin-sso (manual, Jellyfin Settings →
  #    Plugins → Repositories) for Authelia-redirect SSO later if
  #    they want; not on by default because the SSO plugin is
  #    community-maintained and install is interactive.
  - name: jellyfin
    image: docker.io/jellyfin/jellyfin:latest
    env:
      - name: TZ
        value: "{{TZ}}"
      - name: JELLYFIN_PublishedServerUrl
        value: "https://{{MEDIA_SUBDOMAIN}}.{{PUBLIC_DOMAIN}}"
      # `unevaluated` keeps Jellyfin from inserting its own privileged
      # nginx-style restart logic; we manage the unit via Quadlet.
    ports:
      - containerPort: {{JELLYFIN_PORT}}
        hostPort: {{JELLYFIN_PORT}}
    volumeMounts:
      - mountPath: /config
        name: jellyfin-config
      - mountPath: /cache
        name: jellyfin-cache
      - mountPath: /media
        name: jellyfin-media
        readOnly: true

  volumes:
  - name: jellyfin-config
    hostPath:
      path: {{DATA_DIR}}/media/jellyfin-config
      type: DirectoryOrCreate
  - name: jellyfin-cache
    hostPath:
      path: {{DATA_DIR}}/media/jellyfin-cache
      type: DirectoryOrCreate
  - name: jellyfin-media
    hostPath:
      path: {{JELLYFIN_MEDIA_PATH}}
      type: DirectoryOrCreate
