apiVersion: v1
kind: Pod
metadata:
  name: media
  labels:
    app: media
    servicebay.role: media
  annotations:
    servicebay.label: "Media (Audiobookshelf + Navidrome)"
    servicebay.schema-version: "1"
    # Audiobookshelf's post-deploy registers an OIDC client in Authelia
    # and its public URLs route through nginx — both prerequisites.
    servicebay.dependencies: "nginx,auth"
    servicebay.ports: "{{ABS_PORT}}/tcp,{{NAVIDROME_PORT}}/tcp"
spec:
  hostNetwork: true
  containers:
  # 1. Audiobookshelf — Audiobooks + podcasts library + listening apps
  - name: audiobookshelf
    image: ghcr.io/advplyr/audiobookshelf:latest
    env:
      - name: PORT
        value: "{{ABS_PORT}}"
      - name: TZ
        value: "{{TZ}}"
    ports:
      - containerPort: {{ABS_PORT}}
    volumeMounts:
      - mountPath: /config
        name: abs-config
      - mountPath: /metadata
        name: abs-metadata
      - mountPath: /audiobooks
        name: abs-audiobooks
      - mountPath: /podcasts
        name: abs-podcasts

  # 2. Navidrome — Music library + Subsonic-API endpoint for mobile clients
  - name: navidrome
    image: docker.io/deluan/navidrome:latest
    env:
      - name: ND_PORT
        value: "{{NAVIDROME_PORT}}"
      - name: ND_DATAFOLDER
        value: /data
      - name: ND_MUSICFOLDER
        value: /music
      - name: ND_LOGLEVEL
        value: info
      - name: ND_SCANSCHEDULE
        value: "@every 1h"
      - name: ND_ENABLEUSEREDITING
        value: "true"
      # Trust the X-Authelia-User header so the SSO login becomes the
      # Navidrome login automatically. Bound to the loopback subnet
      # because the proxy lives on the same host. Subsonic API calls
      # (mobile apps) ignore this and use built-in user auth.
      - name: ND_REVERSEPROXYUSERHEADER
        value: Remote-User
      - name: ND_REVERSEPROXYWHITELIST
        value: 127.0.0.1/32
    ports:
      - containerPort: {{NAVIDROME_PORT}}
    volumeMounts:
      - mountPath: /data
        name: navidrome-data
      - mountPath: /music
        name: navidrome-music
        readOnly: true

  volumes:
  - name: abs-config
    hostPath:
      path: {{DATA_DIR}}/media/audiobookshelf-config
      type: DirectoryOrCreate
  - name: abs-metadata
    hostPath:
      path: {{DATA_DIR}}/media/audiobookshelf-metadata
      type: DirectoryOrCreate
  - name: abs-audiobooks
    hostPath:
      path: {{ABS_AUDIOBOOKS_PATH}}
      type: DirectoryOrCreate
  - name: abs-podcasts
    hostPath:
      path: {{ABS_PODCASTS_PATH}}
      type: DirectoryOrCreate
  - name: navidrome-data
    hostPath:
      path: {{DATA_DIR}}/media/navidrome
      type: DirectoryOrCreate
  - name: navidrome-music
    hostPath:
      path: {{NAVIDROME_MUSIC_PATH}}
      type: DirectoryOrCreate
