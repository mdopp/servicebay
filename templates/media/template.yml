apiVersion: v1
kind: Pod
metadata:
  name: media
  labels:
    app: media
    servicebay.role: media
  annotations:
    servicebay.label: "Media (Audiobookshelf + Navidrome)"
    servicebay.schema-version: "2"
    # Audiobookshelf's post-deploy registers an OIDC client in Authelia
    # and its public URLs route through nginx — both prerequisites.
    servicebay.dependencies: "nginx,auth"
    servicebay.ports: "{{ABS_PORT}}/tcp,{{NAVIDROME_PORT}}/tcp"
spec:
  hostNetwork: true
  containers:
  # 1. Audiobookshelf — Audiobooks + podcasts library + listening apps
  - name: audiobookshelf
    image: ghcr.io/advplyr/audiobookshelf:latest
    env:
      - name: PORT
        value: "{{ABS_PORT}}"
      - name: TZ
        value: "{{TZ}}"
    ports:
      - containerPort: {{ABS_PORT}}
    volumeMounts:
      - mountPath: /config
        name: abs-config
      - mountPath: /metadata
        name: abs-metadata
      - mountPath: /audiobooks
        name: abs-audiobooks
      - mountPath: /podcasts
        name: abs-podcasts

  # 2. Navidrome — Music library + Subsonic-API endpoint for mobile clients
  - name: navidrome
    image: docker.io/deluan/navidrome:latest
    env:
      - name: ND_PORT
        value: "{{NAVIDROME_PORT}}"
      - name: ND_DATAFOLDER
        value: /data
      - name: ND_MUSICFOLDER
        value: /music
      - name: ND_LOGLEVEL
        value: info
      - name: ND_SCANSCHEDULE
        value: "@every 1h"
      - name: ND_ENABLEUSEREDITING
        value: "true"
      # OIDC against Authelia (v2 / #413). The previous
      # ND_REVERSEPROXYUSERHEADER setup expected NPM to forward an
      # Authelia-injected `Remote-User` header, but the proxy host was
      # never wired up with Authelia forward-auth — so the header
      # never arrived and only the local admin worked. OIDC is the
      # consistent pattern across services in ServiceBay and lets
      # Navidrome display an explicit "Sign in with Authelia" button.
      # Subsonic API calls (mobile apps) bypass this and continue to
      # use the local admin account.
      - name: ND_OIDC_ENABLED
        value: "{{NAVIDROME_OIDC_ENABLED}}"
      - name: ND_OIDC_ISSUER
        value: "https://auth.{{PUBLIC_DOMAIN}}"
      - name: ND_OIDC_CLIENTID
        value: "navidrome"
      - name: ND_OIDC_CLIENTSECRET
        value: "{{NAVIDROME_OIDC_SECRET}}"
      - name: ND_OIDC_REDIRECTURL
        value: "https://{{NAVIDROME_SUBDOMAIN}}.{{PUBLIC_DOMAIN}}/auth/oidc/callback"
      - name: ND_OIDC_AUTOREGISTER
        value: "true"
    ports:
      - containerPort: {{NAVIDROME_PORT}}
    volumeMounts:
      - mountPath: /data
        name: navidrome-data
      - mountPath: /music
        name: navidrome-music
        readOnly: true

  volumes:
  - name: abs-config
    hostPath:
      path: {{DATA_DIR}}/media/audiobookshelf-config
      type: DirectoryOrCreate
  - name: abs-metadata
    hostPath:
      path: {{DATA_DIR}}/media/audiobookshelf-metadata
      type: DirectoryOrCreate
  - name: abs-audiobooks
    hostPath:
      path: {{ABS_AUDIOBOOKS_PATH}}
      type: DirectoryOrCreate
  - name: abs-podcasts
    hostPath:
      path: {{ABS_PODCASTS_PATH}}
      type: DirectoryOrCreate
  - name: navidrome-data
    hostPath:
      path: {{DATA_DIR}}/media/navidrome
      type: DirectoryOrCreate
  - name: navidrome-music
    hostPath:
      path: {{NAVIDROME_MUSIC_PATH}}
      type: DirectoryOrCreate
