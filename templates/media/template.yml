apiVersion: v1
kind: Pod
metadata:
  name: media
  labels:
    app: media
    servicebay.role: media
  annotations:
    servicebay.label: "Media (Audiobookshelf + Jellyfin)"
    servicebay.schema-version: "4"
    # Audiobookshelf's post-deploy registers an OIDC client in Authelia
    # and both apps' public URLs route through nginx — both prerequisites.
    servicebay.dependencies: "nginx,auth"
    servicebay.ports: "{{ABS_PORT}}/tcp,{{JELLYFIN_PORT}}/tcp"
    # Continuous health probe (#628). Audiobookshelf's `/healthcheck`
    # returns 200 once the SQLite store is initialized and the OIDC
    # subsystem is wired. Jellyfin shares the pod lifecycle, so if
    # ABS is up the pod is up; #618's UserManager-init race is gated
    # by post-deploy.py's own retry loop, not by this continuous probe.
    servicebay.healthcheck: |
      url: http://localhost:{{ABS_PORT}}/healthcheck
      interval: 30s
      timeout: 5s
      startup_timeout: 5m
spec:
  # #817: Media runs in its own network namespace (no hostNetwork) so a
  # compromised audiobookshelf/jellyfin container can't reach the host's
  # other service ports or the ServiceBay control API.
  #   - Both apps are published to the host via `hostPort` on their
  #     container ports below; nothing else in the pod is LAN-reachable.
  #   - Audiobookshelf does *server-side* OIDC discovery against
  #     https://auth.<PUBLIC_DOMAIN>. An isolated container's resolver
  #     doesn't apply AdGuard's `*.PUBLIC_DOMAIN → LAN IP` rewrite, so
  #     the `hostAliases` entry pins that name to the LAN IP — the
  #     request then flows container → LAN IP → NPM → Authelia.
  #     {{LAN_IP}} is filled in by the install runner at deploy time.
  #   - post-deploy.py runs in the host netns (not the pod), so its
  #     `127.0.0.1:9091` Authelia probe and `127.0.0.1:<ABS_PORT>`
  #     audiobookshelf probe keep working — the latter via the hostPort.
  hostAliases:
    - ip: "{{LAN_IP}}"
      hostnames:
        - "auth.{{PUBLIC_DOMAIN}}"
  containers:
  # 1. Audiobookshelf — Audiobooks + podcasts library + listening apps.
  #    Authentication: native OIDC against Authelia (configured by
  #    post-deploy.py via API), so family members single-sign-on.
  - name: audiobookshelf
    image: ghcr.io/advplyr/audiobookshelf:latest
    env:
      - name: PORT
        value: "{{ABS_PORT}}"
      - name: TZ
        value: "{{TZ}}"
    ports:
      - containerPort: {{ABS_PORT}}
        hostPort: {{ABS_PORT}}
    volumeMounts:
      - mountPath: /config
        name: abs-config
      - mountPath: /metadata
        name: abs-metadata
      - mountPath: /audiobooks
        name: abs-audiobooks
      - mountPath: /podcasts
        name: abs-podcasts

  # 2. Jellyfin — Music library + (future) video, with Quick Connect for
  #    Symfonium/Findroid/Streamyfin etc. Quick Connect is the practical
  #    SSO answer for Subsonic-style apps: web-confirm a 6-digit code
  #    that the mobile app shows, no shared passwords. Web-UI itself
  #    runs against Jellyfin's own user DB by default — operators can
  #    install jellyfin-plugin-sso (manual, Jellyfin Settings →
  #    Plugins → Repositories) for Authelia-redirect SSO later if
  #    they want; not on by default because the SSO plugin is
  #    community-maintained and install is interactive.
  - name: jellyfin
    image: docker.io/jellyfin/jellyfin:latest
    env:
      - name: TZ
        value: "{{TZ}}"
      - name: JELLYFIN_PublishedServerUrl
        value: "https://{{MEDIA_SUBDOMAIN}}.{{PUBLIC_DOMAIN}}"
      # `unevaluated` keeps Jellyfin from inserting its own privileged
      # nginx-style restart logic; we manage the unit via Quadlet.
    ports:
      - containerPort: {{JELLYFIN_PORT}}
        hostPort: {{JELLYFIN_PORT}}
    volumeMounts:
      - mountPath: /config
        name: jellyfin-config
      - mountPath: /cache
        name: jellyfin-cache
      - mountPath: /media
        name: jellyfin-media
        readOnly: true

  volumes:
  - name: abs-config
    hostPath:
      path: {{DATA_DIR}}/media/audiobookshelf-config
      type: DirectoryOrCreate
  - name: abs-metadata
    hostPath:
      path: {{DATA_DIR}}/media/audiobookshelf-metadata
      type: DirectoryOrCreate
  - name: abs-audiobooks
    hostPath:
      path: {{ABS_AUDIOBOOKS_PATH}}
      type: DirectoryOrCreate
  - name: abs-podcasts
    hostPath:
      path: {{ABS_PODCASTS_PATH}}
      type: DirectoryOrCreate
  - name: jellyfin-config
    hostPath:
      path: {{DATA_DIR}}/media/jellyfin-config
      type: DirectoryOrCreate
  - name: jellyfin-cache
    hostPath:
      path: {{DATA_DIR}}/media/jellyfin-cache
      type: DirectoryOrCreate
  - name: jellyfin-media
    hostPath:
      path: {{JELLYFIN_MEDIA_PATH}}
      type: DirectoryOrCreate
