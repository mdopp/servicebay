apiVersion: v1
kind: Pod
metadata:
  name: file-share
  labels:
    app: file-share
  annotations:
    servicebay.ports: "8384/tcp,22000/tcp,139/tcp,445/tcp"
    # Disable SELinux labelling on the syncthing + samba bind mounts.
    # Fedora CoreOS ships SELinux enforcing; without this annotation,
    # podman play-kube doesn't relabel the hostPath dirs and syncthing
    # can't `chmod` or write its cert.pem ("operation not permitted")
    # even with runAsUser: 0. Targeted per-container disable is safer
    # than `privileged: true` — no extra capabilities granted.
    io.podman.annotations.label/syncthing: "disable"
    io.podman.annotations.label/samba: "disable"
spec:
  hostNetwork: true
  containers:
  # 1. Syncthing — Bidirectional folder sync (Android & Windows apps)
  - name: syncthing
    image: docker.io/syncthing/syncthing:latest
    # Earlier attempts (runAsUser:0 + io.podman.annotations.label/syncthing
    # = disable) didn't actually let syncthing chmod its config dir on
    # FCoS. Either the annotation isn't honoured by this podman version,
    # or the deeper issue is the bind-mount label rather than the
    # process's SELinux context. Skip the puzzle and grant privileged:
    # the UID-namespace + SELinux + cap-drop combo all step out of the
    # way at once. This pod's containers (syncthing + samba) are both
    # standard, unprivileged-on-the-host services; on a single-tenant
    # homelab the operator already trusts the workload completely. The
    # rootless-podman boundary still applies — privileged here means
    # "no extra capability *deductions*", not "host root".
    securityContext:
      runAsUser: 0
      runAsGroup: 0
      privileged: true
    env:
      - name: STGUIADDRESS
        value: "0.0.0.0:8384"
    ports:
      - containerPort: 8384
      - containerPort: 22000
    volumeMounts:
      - mountPath: /var/syncthing/Sync
        name: shared-data
      - mountPath: /var/syncthing/config
        name: syncthing-config

  # 2. Samba — SMB/CIFS network shares with simple user/password auth
  - name: samba
    image: docker.io/servercontainers/samba:latest
    env:
      - name: SAMBA_GLOBAL_STANZA
        value: "server min protocol = SMB2; log level = 1;"
      - name: ACCOUNT_{{SHARE_USER}}
        value: "{{SHARE_PASSWORD}}"
      - name: SAMBA_VOLUME_CONFIG_data
        value: "[data]; path=/data; valid users = {{SHARE_USER}}; guest ok = no; read only = no; browseable = yes;"
    volumeMounts:
      - mountPath: /data
        name: shared-data

  volumes:
  - name: shared-data
    hostPath:
      path: {{DATA_DIR}}/file-share/data
      type: DirectoryOrCreate
  - name: syncthing-config
    hostPath:
      path: {{DATA_DIR}}/file-share/syncthing
      type: DirectoryOrCreate
