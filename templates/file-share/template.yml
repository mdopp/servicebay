apiVersion: v1
kind: Pod
metadata:
  name: file-share
  labels:
    app: file-share
  annotations:
    servicebay.ports: "8384/tcp,22000/tcp,139/tcp,445/tcp"
spec:
  hostNetwork: true
  containers:
  # 1. Syncthing — Bidirectional folder sync (Android & Windows apps)
  - name: syncthing
    image: docker.io/syncthing/syncthing:latest
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
    env:
      - name: STGUIADDRESS
        value: "0.0.0.0:8384"
    ports:
      - containerPort: 8384
      - containerPort: 22000
    volumeMounts:
      - mountPath: /var/syncthing/Sync
        name: shared-data
      - mountPath: /var/syncthing/config
        name: syncthing-config
      - mountPath: /var/syncthing/Sync/usb
        name: usb-data
        readOnly: false

  # 2. Samba — SMB/CIFS network shares with simple user/password auth
  - name: samba
    image: docker.io/servercontainers/samba:latest
    env:
      - name: SAMBA_GLOBAL_STANZA
        value: "server min protocol = SMB2; log level = 1;"
      - name: ACCOUNT_{{SHARE_USER}}
        value: "{{SHARE_PASSWORD}}"
      - name: SAMBA_VOLUME_CONFIG_data
        value: "[data]; path=/data; valid users = {{SHARE_USER}}; guest ok = no; read only = no; browseable = yes;"
      - name: SAMBA_VOLUME_CONFIG_usb
        value: "[usb]; path=/usb; valid users = {{SHARE_USER}}; guest ok = no; read only = no; browseable = yes;"
    volumeMounts:
      - mountPath: /data
        name: shared-data
      - mountPath: /usb
        name: usb-data
        readOnly: false

  volumes:
  - name: shared-data
    hostPath:
      path: /mnt/data
      type: DirectoryOrCreate
  - name: syncthing-config
    hostPath:
      path: {{DATA_DIR}}/file-share/syncthing
      type: DirectoryOrCreate
  - name: usb-data
    hostPath:
      path: /mnt/usb
      type: DirectoryOrCreate
