apiVersion: v1
kind: Pod
metadata:
  name: file-share
  labels:
    app: file-share
spec:
  hostNetwork: true
  containers:
  # 1. WebDAV — Access files from any OS file manager or WebDAV client
  - name: webdav
    image: docker.io/bytemark/webdav:latest
    env:
      - name: AUTH_TYPE
        value: "Basic"
      - name: USERNAME
        value: "{{SHARE_USER}}"
      - name: PASSWORD
        value: "{{SHARE_PASSWORD}}"
    ports:
      - containerPort: 8090
    volumeMounts:
      - mountPath: /var/lib/dav/data
        name: shared-data
      - mountPath: /var/lib/dav/data/usb
        name: usb-data
        readOnly: false

  # 2. Syncthing — Bidirectional folder sync (Android & Windows apps)
  - name: syncthing
    image: docker.io/syncthing/syncthing:latest
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
    env:
      - name: STGUIADDRESS
        value: "0.0.0.0:8384"
    ports:
      - containerPort: 8384
      - containerPort: 22000
    volumeMounts:
      - mountPath: /var/syncthing/Sync
        name: shared-data
      - mountPath: /var/syncthing/config
        name: syncthing-config
      - mountPath: /var/syncthing/Sync/usb
        name: usb-data
        readOnly: false

  # 3. Samba — SMB/CIFS network shares for Windows drive mapping
  - name: samba
    image: docker.io/servercontainers/samba:latest
    env:
      - name: SAMBA_GLOBAL_STANZA
        value: "server min protocol = SMB2; log level = 1;"
      - name: ACCOUNT_{{SHARE_USER}}
        value: "{{SHARE_PASSWORD}}"
      - name: UID_{{SHARE_USER}}
        value: "1000"
      - name: SAMBA_VOLUME_CONFIG_share
        value: "[share]; path=/share; valid users = {{SHARE_USER}}; guest ok = no; read only = no; browseable = yes;"
      - name: SAMBA_VOLUME_CONFIG_usb
        value: "[usb]; path=/usb; valid users = {{SHARE_USER}}; guest ok = no; read only = no; browseable = yes;"
    volumeMounts:
      - mountPath: /share
        name: shared-data
      - mountPath: /usb
        name: usb-data
        readOnly: false

  volumes:
  - name: shared-data
    hostPath:
      path: {{DATA_DIR}}/stacks/file-share/data
      type: DirectoryOrCreate
  - name: syncthing-config
    hostPath:
      path: {{DATA_DIR}}/stacks/file-share/syncthing
      type: DirectoryOrCreate
  - name: usb-data
    hostPath:
      path: /mnt/usb
      type: DirectoryOrCreate
