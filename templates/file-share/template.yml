apiVersion: v1
kind: Pod
metadata:
  name: file-share
  labels:
    app: file-share
  annotations:
    servicebay.label: "Files"
    servicebay.schema-version: "4"
    # FileBrowser is fronted by Authelia via the nginx proxy host — both
    # must be running before this template's post-deploy can wire SSO.
    servicebay.dependencies: "nginx,auth"
    servicebay.ports: "8384/tcp,22000/tcp,139/tcp,445/tcp,{{FILEBROWSER_PORT}}/tcp"
    # Continuous health probe (#628). FileBrowser's `/health` returns a
    # plain 200 once the binary loaded its SQLite DB — the most useful
    # signal for this pod's readiness. Syncthing + Samba health is
    # implicit: if the pod is alive, the whole containers list is
    # running (Quadlet binds them as a single unit).
    servicebay.healthcheck: |
      url: http://localhost:{{FILEBROWSER_PORT}}/health
      interval: 30s
      timeout: 5s
      startup_timeout: 5m
    # Pin the .filebrowser.json.mustache target to filebrowser's /config
    # mount — without this the wizard's path resolver would also consider
    # other /config-style mounts and pick whichever lands first in the
    # parsed YAML.
    servicebay.config-mount: "/config"
    # Disable SELinux labelling on the bind mounts. FCoS ships SELinux
    # enforcing; without this annotation podman play-kube doesn't relabel
    # the host bind dirs and samba can't write the share state, and
    # filebrowser's seed-config `cp` fails with EPERM. Targeted per-
    # container disable is safer than a pod-wide privileged flag.
    io.podman.annotations.label/syncthing: "disable"
    io.podman.annotations.label/samba: "disable"
    io.podman.annotations.label/filebrowser: "disable"
spec:
  hostNetwork: true
  containers:
  # 1. Syncthing — Bidirectional folder sync (Android & desktop apps)
  - name: syncthing
    image: docker.io/syncthing/syncthing:latest
    # THREE ingredients are needed to make syncthing's startup `chmod` of
    # /var/syncthing/config succeed under rootless podman + FCoS:
    #
    #   1. Use a podman-managed PVC for syncthing-config (see PVC below).
    #      A host bind mount fails with EPERM no matter what the container
    #      capabilities are — that's a kernel-level idmap issue.
    #
    #   2. runAsUser: 0 / runAsGroup: 0. Podman creates the named volume
    #      owned by the host user running rootless podman (uid 1000 =
    #      `core`), which inside the container appears as uid 0.
    #
    #   3. PUID=0 / PGID=0 env vars. The syncthing/syncthing image's
    #      entrypoint runs `setpriv --reuid $PUID --regid $PGID` REGARDLESS
    #      of the K8s runAsUser — defaulting to 1000:1000. Without these
    #      env overrides, the container starts as uid 0 but immediately
    #      drops to uid 1000, which doesn't own the volume's _data dir
    #      (created as container uid 0 = host uid 1000). Setting PUID=0
    #      keeps everything at uid 0 end-to-end and chmod succeeds.
    #
    # All three pieces together = no crash loop. Any one missing = EPERM.
    # Verified the hard way: spent a debugging session walking through each
    # combination on a live FCoS box.
    securityContext:
      runAsUser: 0
      runAsGroup: 0
    env:
      - name: PUID
        value: "0"
      - name: PGID
        value: "0"
      # Bind the GUI on loopback only. LAN devices reach Syncthing's
      # web UI via `https://<SYNCTHING_SUBDOMAIN>.<PUBLIC_DOMAIN>`,
      # which NPM gates with Authelia forward-auth. A 0.0.0.0 bind
      # would let any LAN device hit `:8384` directly and skip the
      # SSO gate. The Syncthing mobile/desktop apps speak the REST
      # API on the same port with their own API keys — those keep
      # working because they hit Syncthing through the local pod
      # network (hostNetwork=true, so 127.0.0.1 is reachable).
      - name: STGUIADDRESS
        value: "127.0.0.1:8384"
      # GUI Host: header check — disabled via post-deploy.py patching
      # config.xml's `<insecureSkipHostcheck>` (no equivalent env var
      # exists in Syncthing). Without that patch the proxied URL
      # `sync.<PUBLIC_DOMAIN>` returns HTTP 403 `Host check error`
      # because Syncthing's default allowlist is bind-address only.
      # The actual gate is Authelia forward-auth + the LAN-only access
      # list at the proxy layer, so opening this is not an auth bypass.
      # (#880)
      # Disable Syncthing's UPnP / NAT-PMP NAT-traversal (#415). The
      # FritzBox replies 403 to AddPortMapping on its IPv6 WAN entry
      # (WANIPConn2), which Syncthing then retries on a loop and
      # buries the real container logs. LAN sync still works; remote
      # sync falls back to Syncthing's relay servers — acceptable
      # for a family home-server scenario.
      - name: STNOUPNP
        value: "1"
    ports:
      - containerPort: 8384
      - containerPort: 22000
    volumeMounts:
      - mountPath: /var/syncthing/Sync
        name: shared-data
      - mountPath: /var/syncthing/config
        name: syncthing-config

  # 2. Samba — SMB/CIFS network shares with per-user authentication.
  #
  # Per-user accounts are synced from LLDAP into Samba's tdbsam DB by
  # ServiceBay's /api/system/file-share/samba/users endpoint and managed
  # operator-side via Settings → Integrations → File Share. Samba can't
  # speak OIDC, so the password lives in tdbsam — set/regenerated from
  # the UI, deliberately not derived from the LLDAP password (Argon2/
  # bcrypt → NT-hash is not a reversible operation).
  #
  # SHARE_USER + SHARE_PASSWORD remain as a legacy fallback so existing
  # installs keep working until the operator migrates family members
  # onto LLDAP-backed Samba accounts. The share config no longer pins
  # `valid users` to a single name — any tdbsam user can mount.
  - name: samba
    image: docker.io/servercontainers/samba:latest
    env:
      - name: SAMBA_GLOBAL_STANZA
        value: "server min protocol = SMB2; log level = 1;"
      - name: ACCOUNT_{{SHARE_USER}}
        value: "{{SHARE_PASSWORD}}"
      - name: SAMBA_VOLUME_CONFIG_data
        value: "[data]; path=/data; guest ok = no; read only = no; browseable = yes;"
    volumeMounts:
      - mountPath: /data
        name: shared-data

  # 3. FileBrowser — Family-facing web file manager over the shared volume.
  # Binds on 0.0.0.0 — NPM lives in its own pod netns and can't reach the
  # host's 127.0.0.1, so loopback-only would make FB unreachable to the
  # reverse proxy. FB runs in proxy-auth mode (auth.method=proxy with
  # Remote-User), so a request without that header is rejected with 403 —
  # direct LAN hits on :8088 can't bypass Authelia, only NPM-proxied
  # requests with a valid forward-auth response get through.
  - name: filebrowser
    image: docker.io/filebrowser/filebrowser:latest
    # Run as container UID 0. Under rootless podman that maps to the host
    # user running podman (e.g. `core`/uid 1000), which owns the hostPath
    # dirs we mount below. Without this override the filebrowser image's
    # default non-root user maps to a sub-UID that has no write access on
    # the host directories, causing the entrypoint's seed-config `cp` to
    # fail with "Permission denied" in a tight restart loop.
    securityContext:
      runAsUser: 0
      runAsGroup: 0
    # The filebrowser image's HEALTHCHECK runs healthcheck.sh, which
    # probes `http://${FB_ADDRESS:-localhost}:${FB_PORT}/health`. When
    # those envs aren't set the script falls back to reading
    # `/config/settings.json` — but our config file is
    # `/config/.filebrowser.json` (legacy `--config=` style), so the
    # script's jq lookup fails, PORT comes out empty, and the probe
    # always fails. `podman ps` then shows `(unhealthy)` even though
    # filebrowser is serving fine through NPM. Setting FB_PORT +
    # FB_ADDRESS here gives the healthcheck.sh what it needs without
    # changing the config-file shape — closes #319.
    env:
      - name: FB_PORT
        value: "{{FILEBROWSER_PORT}}"
      - name: FB_ADDRESS
        value: "0.0.0.0"
    args:
      - "--config=/config/.filebrowser.json"
      - "--database=/database/filebrowser.db"
      - "--root=/srv"
      - "--address=0.0.0.0"
      - "--port={{FILEBROWSER_PORT}}"
    ports:
      - containerPort: {{FILEBROWSER_PORT}}
    volumeMounts:
      - mountPath: /srv
        name: shared-data
      - mountPath: /database
        name: filebrowser-db
      - mountPath: /config
        name: filebrowser-config

  volumes:
  - name: shared-data
    hostPath:
      path: {{DATA_DIR}}/file-share/data
      type: DirectoryOrCreate
  # syncthing-config is a podman-managed PVC (see kind: PersistentVolumeClaim
  # below). Earlier versions used hostPath here; even with privileged: true,
  # runAsUser: 0 and the SELinux disable annotation, syncthing's startup
  # `chmod` against the bind mount returned EPERM on rootless podman + FCoS.
  # The named volume sidesteps it entirely.
  - name: syncthing-config
    persistentVolumeClaim:
      claimName: file-share-syncthing-config
  - name: filebrowser-db
    hostPath:
      path: {{DATA_DIR}}/file-share/filebrowser-db
      type: DirectoryOrCreate
  - name: filebrowser-config
    hostPath:
      path: {{DATA_DIR}}/file-share/filebrowser-config
      type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: file-share-syncthing-config
  labels:
    app: file-share
