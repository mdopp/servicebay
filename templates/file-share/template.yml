apiVersion: v1
kind: Pod
metadata:
  name: file-share
  labels:
    app: file-share
spec:
  hostNetwork: true
  containers:
  # 1. FileBrowser — Web-based file explorer (browse, upload, download, share links)
  - name: filebrowser
    image: docker.io/filebrowser/filebrowser:latest
    securityContext:
      runAsUser: 0
      runAsGroup: 0
    args:
      - "--port=8090"
      - "--root=/srv"
      - "--database=/db/filebrowser.db"
    volumeMounts:
      - mountPath: /srv
        name: shared-data
      - mountPath: /db
        name: filebrowser-db

  # 2. Syncthing — Bidirectional folder sync (Android & Windows apps)
  - name: syncthing
    image: docker.io/syncthing/syncthing:latest
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
    env:
      - name: STGUIADDRESS
        value: "0.0.0.0:8384"
    volumeMounts:
      - mountPath: /var/syncthing/Sync
        name: shared-data
      - mountPath: /var/syncthing/config
        name: syncthing-config

  # 3. Samba — SMB/CIFS network shares for Windows drive mapping (port 445)
  - name: samba
    image: docker.io/servercontainers/samba:latest
    env:
      - name: SAMBA_GLOBAL_STANZA
        value: "server min protocol = SMB2; log level = 1;"
      - name: ACCOUNT_{{SMB_USER}}
        value: "{{SMB_PASSWORD}}"
      - name: UID_{{SMB_USER}}
        value: "1000"
      - name: SAMBA_VOLUME_CONFIG_share
        value: "[share]; path=/share; valid users = {{SMB_USER}}; guest ok = no; read only = no; browseable = yes;"
    volumeMounts:
      - mountPath: /share
        name: shared-data

  volumes:
  # Shared data — mounted by all three containers
  - name: shared-data
    hostPath:
      path: {{DATA_DIR}}/file-share/data
      type: DirectoryOrCreate
  # Syncthing config, keys, and database
  - name: syncthing-config
    hostPath:
      path: {{DATA_DIR}}/file-share/syncthing
      type: DirectoryOrCreate
  # FileBrowser SQLite database
  - name: filebrowser-db
    hostPath:
      path: {{DATA_DIR}}/file-share/filebrowser
      type: DirectoryOrCreate
