apiVersion: v1
kind: Pod
metadata:
  name: auth
  labels:
    app: auth
  annotations:
    servicebay.label: "Auth (LLDAP + Authelia)"
    servicebay.schema-version: "1"
    servicebay.tier: "infrastructure"
    # post-deploy.py calls /api/system/lldap/* and /api/system/authelia/*.
    # Pin the API versions (#588) so core refuses to invoke this script if
    # a future ServiceBay renames or restructures those endpoints.
    servicebay.requires-api.lldap: "1"
    servicebay.requires-api.authelia: "1"
    servicebay.ports: "{{LLDAP_PORT}}/tcp,{{LLDAP_LDAP_PORT}}/tcp,{{AUTHELIA_PORT}}/tcp"
    # Pin the configuration.yml.mustache target to authelia's /config mount —
    # without this the wizard's path resolver would also consider lldap's
    # mounts and pick whichever lands first in the parsed YAML.
    servicebay.config-mount: "/config"
    # Readiness probes (#613). The install runner blocks on these between
    # `systemctl start` and `post-deploy.py`. Replaces the in-script
    # `wait_for_lldap` helper (still kept inside post-deploy.py as a
    # defence-in-depth for the seed call, but the heavy lifting is here).
    #   - LLDAP HTTP: GraphQL returns 401 once the SQLite schema is
    #     initialized — earliest reliable "really ready" signal.
    #   - LDAP socket: the 3890 port comes up a few seconds after the
    #     HTTP port; downstream templates that bind via LDAP need this.
    #   - Authelia OIDC discovery: 200 once Authelia has finished
    #     loading its config + reached LLDAP.
    servicebay.readiness: |
      - kind: http
        url: http://localhost:{{LLDAP_PORT}}/api/graphql
        method: POST
        body: '{"query":"{__typename}"}'
        expect_status: 401
        timeout: 10m
      - kind: tcp
        host: localhost
        port: {{LLDAP_LDAP_PORT}}
        timeout: 2m
      - kind: http
        url: http://localhost:{{AUTHELIA_PORT}}/.well-known/openid-configuration
        expect_status: 200
        timeout: 5m
    # Continuous health probe (#626). Authelia's `/api/health` returns
    # `{"status":"OK"}` and is unauthenticated. Proves both Authelia is
    # alive AND has loaded its config; LLDAP is implicitly covered
    # because Authelia refuses to start without it.
    servicebay.healthcheck: |
      url: http://localhost:{{AUTHELIA_PORT}}/api/health
      interval: 30s
      timeout: 5s
      startup_timeout: 5m
spec:
  hostNetwork: true
  containers:
  # 1. LLDAP — Lightweight LDAP server. Started first because Authelia
  #    won't pass its own readiness check until the LDAP socket is up.
  - name: lldap
    image: docker.io/lldap/lldap:latest
    env:
      - name: LLDAP_JWT_SECRET
        value: "{{LLDAP_JWT_SECRET}}"
      - name: LLDAP_LDAP_BASE_DN
        value: "{{LLDAP_BASE_DN}}"
      - name: LLDAP_LDAP_USER_PASS
        value: "{{LLDAP_ADMIN_PASSWORD}}"
      - name: LLDAP_LDAP_USER_DN
        value: "admin"
      - name: LLDAP_HTTP_PORT
        value: "{{LLDAP_PORT}}"
      - name: LLDAP_LDAP_PORT
        value: "{{LLDAP_LDAP_PORT}}"
    ports:
      - containerPort: {{LLDAP_PORT}}
      - containerPort: {{LLDAP_LDAP_PORT}}
    volumeMounts:
      - mountPath: /data
        name: lldap-data

  # 2. Authelia — SSO portal + OIDC IdP, backed by LLDAP via localhost.
  - name: authelia
    image: docker.io/authelia/authelia:latest
    ports:
      - containerPort: {{AUTHELIA_PORT}}
    volumeMounts:
      - mountPath: /config
        name: authelia-config
      - mountPath: /data
        name: authelia-data

  volumes:
  - name: lldap-data
    hostPath:
      path: {{DATA_DIR}}/auth/lldap
      type: DirectoryOrCreate
  - name: authelia-config
    hostPath:
      path: {{DATA_DIR}}/auth/authelia-config
      type: DirectoryOrCreate
  - name: authelia-data
    hostPath:
      path: {{DATA_DIR}}/auth/authelia-data
      type: DirectoryOrCreate
