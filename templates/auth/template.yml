apiVersion: v1
kind: Pod
metadata:
  name: auth
  labels:
    app: auth
  annotations:
    servicebay.label: "Sign-In Gate"
    # v2 (#1737): authelia container now waits for LLDAP's LDAP socket before
    # starting, eliminating the fatal startup-race crash. No data move.
    servicebay.schema-version: "2"
    servicebay.tier: "infrastructure"
    # post-deploy.py calls /api/system/lldap/* and /api/system/authelia/*.
    # Pin the API versions (#588) so core refuses to invoke this script if
    # a future ServiceBay renames or restructures those endpoints.
    servicebay.requires-api.lldap: "1"
    servicebay.requires-api.authelia: "1"
    # AUTHELIA_PORT first because that's the port every cross-pod
    # consumer talks to (OIDC discovery, forward-auth). When the
    # network map renders a `declared` edge into `auth`, picking the
    # first port shows that consumer-facing port instead of the
    # admin-only LLDAP web UI port. (#880-followup)
    servicebay.ports: "{{AUTHELIA_PORT}}/tcp,{{LLDAP_PORT}}/tcp,{{LLDAP_LDAP_PORT}}/tcp"
    # Pin the configuration.yml.mustache target to authelia's /config mount —
    # without this the wizard's path resolver would also consider lldap's
    # mounts and pick whichever lands first in the parsed YAML.
    servicebay.config-mount: "/config"
    # Continuous health probe (#626 / #628). Authelia's `/api/health`
    # returns `{"status":"OK"}` and is unauthenticated. Proves both
    # Authelia is alive AND has loaded its config; LLDAP is implicitly
    # covered because Authelia refuses to start without it. Phase 3C
    # retired the install-time readiness probes; this single signal
    # covers both install gating and ongoing monitoring.
    servicebay.healthcheck: |
      url: http://localhost:{{AUTHELIA_PORT}}/api/health
      interval: 30s
      timeout: 5s
      startup_timeout: 5m
spec:
  hostNetwork: true
  containers:
  # 1. LLDAP — Lightweight LDAP server. Started first because Authelia
  #    won't pass its own readiness check until the LDAP socket is up.
  - name: lldap
    image: docker.io/lldap/lldap:latest
    env:
      - name: LLDAP_JWT_SECRET
        value: "{{LLDAP_JWT_SECRET}}"
      - name: LLDAP_LDAP_BASE_DN
        value: "{{LLDAP_BASE_DN}}"
      - name: LLDAP_LDAP_USER_PASS
        value: "{{LLDAP_ADMIN_PASSWORD}}"
      - name: LLDAP_LDAP_USER_DN
        value: "admin"
      - name: LLDAP_HTTP_PORT
        value: "{{LLDAP_PORT}}"
      - name: LLDAP_LDAP_PORT
        value: "{{LLDAP_LDAP_PORT}}"
      - name: LLDAP_FORCE_LDAP_USER_PASS_RESET
        value: "{{LLDAP_FORCE_LDAP_USER_PASS_RESET}}"
    ports:
      - containerPort: {{LLDAP_PORT}}
      - containerPort: {{LLDAP_LDAP_PORT}}
    volumeMounts:
      - mountPath: /data
        name: lldap-data

  # 2. Authelia — SSO portal + OIDC IdP, backed by LLDAP via localhost.
  #    #1737: containers in a pod start in PARALLEL — YAML order is not start
  #    order. Authelia's startup LDAP check then races LLDAP's socket and the
  #    process exits fatally ("error dialing 'ldap://localhost:3890':
  #    connection refused / fatal: ... startup checks"). systemd Restart=
  #    eventually recovers, but every restart/reboot/redeploy opened an SSO
  #    outage window. Per ADR 0009 (prevent, don't repair-after) we gate the
  #    authelia start on LLDAP's LDAP socket being open with a deterministic,
  #    no-LLM, bounded wait wrapper, then hand off to the image's normal
  #    entrypoint (no args → preserves authelia's default /config discovery
  #    + the entrypoint's PUID/su-exec handling).
  #    - `nc` ships in the authelia image at /bin/nc (BusyBox v1.37.0). That
  #      BusyBox build has NO `-z` flag (the old probe always errored, looped
  #      to the cap, and fell through = a fixed ~120s delay, not a gate). The
  #      portable probe is `nc -w 1 localhost <port> </dev/null`: `-w 1` caps
  #      the connect attempt at 1s and `</dev/null` feeds EOF so nc returns
  #      immediately on a successful connect (exit 0) and non-zero on refused.
  #    - Bounded to ~120 attempts so a genuinely-down LLDAP still surfaces a
  #      clear failure (and systemd Restart= retries) instead of hanging
  #      forever — but a ready LLDAP breaks the loop on the first connect (~1s).
  - name: authelia
    image: docker.io/authelia/authelia:latest
    command: ["/bin/sh", "-c"]
    args:
      - |
        i=0
        until nc -w 1 localhost {{LLDAP_LDAP_PORT}} </dev/null; do
          i=$((i+1))
          if [ "$i" -ge 120 ]; then
            echo "authelia: LLDAP LDAP socket :{{LLDAP_LDAP_PORT}} not ready after ${i} attempts; starting anyway (systemd will restart on fatal exit)" >&2
            break
          fi
          [ "$i" -eq 1 ] && echo "authelia: waiting for LLDAP LDAP socket localhost:{{LLDAP_LDAP_PORT}} ..."
          sleep 1
        done
        echo "authelia: LLDAP LDAP socket reachable; starting authelia"
        exec /app/entrypoint.sh
    ports:
      - containerPort: {{AUTHELIA_PORT}}
    volumeMounts:
      - mountPath: /config
        name: authelia-config
      - mountPath: /data
        name: authelia-data

  volumes:
  - name: lldap-data
    hostPath:
      path: {{DATA_DIR}}/auth/lldap
      type: DirectoryOrCreate
  - name: authelia-config
    hostPath:
      path: {{DATA_DIR}}/auth/authelia-config
      type: DirectoryOrCreate
  - name: authelia-data
    hostPath:
      path: {{DATA_DIR}}/auth/authelia-data
      type: DirectoryOrCreate
