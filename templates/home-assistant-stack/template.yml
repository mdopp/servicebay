apiVersion: v1
kind: Pod
metadata:
  name: home-assistant
  labels:
    app: home-assistant
  annotations:
    servicebay.ports: "8123/tcp,8091/tcp,3000/tcp,10300/tcp,10200/tcp,10400/tcp"
spec:
  hostNetwork: true
  containers:
  # 1. Home Assistant
  - name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    env:
    - name: TZ
      value: "Europe/Berlin"
    volumeMounts:
    - mountPath: /config
      name: ha-config
    - mountPath: /run/dbus
      name: dbus
      readOnly: true
    securityContext:
      privileged: true

  # 2. Z-Wave JS UI
  - name: zwave-js
    image: ghcr.io/zwave-js/zwave-js-ui:latest
    env:
    - name: TZ
      value: "Europe/Berlin"
    - name: SESSION_SECRET
      value: "{{ZWAVE_SECRET}}"
    - name: ZWAVEJS_EXTERNAL_CONFIG
      value: "/usr/src/app/store/.config-db"
    volumeMounts:
    - mountPath: /usr/src/app/store
      name: zwave-config
    - mountPath: /dev/serial-device
      name: zwave-stick
    securityContext:
      privileged: true

  # 3. Matter Server
  - name: matter-server
    image: ghcr.io/home-assistant-libs/python-matter-server:stable
    env:
    - name: TZ
      value: "Europe/Berlin"
    volumeMounts:
    - mountPath: /data
      name: matter-config
    - mountPath: /run/dbus
      name: dbus
      readOnly: true
    securityContext:
      privileged: true

  # 4. Faster Whisper (Speech-to-Text via Wyoming protocol)
  - name: faster-whisper
    image: docker.io/rhasspy/wyoming-whisper:latest
    args:
    - --model
    - "{{WHISPER_MODEL}}"
    - --language
    - "{{WHISPER_LANGUAGE}}"
    - --data-dir
    - /data
    - --uri
    - tcp://0.0.0.0:10300
    volumeMounts:
    - mountPath: /data
      name: whisper-data

  # 5. Piper (Text-to-Speech via Wyoming protocol)
  - name: piper
    image: docker.io/rhasspy/wyoming-piper:latest
    args:
    - --voice
    - "{{PIPER_VOICE}}"
    - --data-dir
    - /data
    - --uri
    - tcp://0.0.0.0:10200
    volumeMounts:
    - mountPath: /data
      name: piper-data

  # 6. openWakeWord (Wake-word detection via Wyoming protocol)
  - name: openwakeword
    image: docker.io/rhasspy/wyoming-openwakeword:latest
    args:
    - --uri
    - tcp://0.0.0.0:10400

  volumes:
  # Persistence
  - name: ha-config
    hostPath:
      path: {{DATA_DIR}}/home-assistant/homeassistant
      type: DirectoryOrCreate
  - name: zwave-config
    hostPath:
      path: {{DATA_DIR}}/home-assistant/zwave-js
      type: DirectoryOrCreate
  - name: matter-config
    hostPath:
      path: {{DATA_DIR}}/home-assistant/matter-server
      type: DirectoryOrCreate
  - name: whisper-data
    hostPath:
      path: {{DATA_DIR}}/home-assistant/whisper
      type: DirectoryOrCreate
  - name: piper-data
    hostPath:
      path: {{DATA_DIR}}/home-assistant/piper
      type: DirectoryOrCreate

  # System Mounts
  - name: dbus
    hostPath:
      path: /run/dbus
      type: Directory
  - name: zwave-stick
    hostPath:
      path: {{ZWAVE_DEVICE}}
      type: CharDevice
