apiVersion: v1
kind: Pod
metadata:
  name: home-assistant
  labels:
    app: home-assistant
spec:
  hostNetwork: true
  containers:
  # 1. Home Assistant
  - name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    env:
    - name: TZ
      value: "Europe/Berlin"
    volumeMounts:
    - mountPath: /config
      name: ha-config
    - mountPath: /run/dbus
      name: dbus
      readOnly: true
    securityContext:
      privileged: true

  # 2. Z-Wave JS UI
  - name: zwave-js
    image: ghcr.io/zwave-js/zwave-js-ui:latest
    env:
    - name: TZ
      value: "Europe/Berlin"
    - name: SESSION_SECRET
      value: "{{ZWAVE_SECRET}}"
    - name: ZWAVEJS_EXTERNAL_CONFIG
      value: "/usr/src/app/store/.config-db"
    volumeMounts:
    - mountPath: /usr/src/app/store
      name: zwave-config
    - mountPath: /dev/serial-device
      name: zwave-stick
    securityContext:
      privileged: true

  # 3. Matter Server
  - name: matter-server
    image: ghcr.io/home-assistant-libs/python-matter-server:stable
    env:
    - name: TZ
      value: "Europe/Berlin"
    volumeMounts:
    - mountPath: /data
      name: matter-config
    - mountPath: /run/dbus
      name: dbus
      readOnly: true
    securityContext:
      privileged: true

  # 4. Whisper (Speech-to-Text via Wyoming protocol)
  - name: whisper
    image: ghcr.io/home-assistant/addon-wyoming-whisper:latest
    env:
    - name: TZ
      value: "Europe/Berlin"
    - name: WHISPER_MODEL
      value: "{{WHISPER_MODEL}}"
    - name: WHISPER_LANGUAGE
      value: "{{WHISPER_LANGUAGE}}"
    ports:
    - containerPort: 10300
      hostPort: 10300
    volumeMounts:
    - mountPath: /data
      name: whisper-data

  # 5. Piper (Text-to-Speech via Wyoming protocol)
  - name: piper
    image: ghcr.io/home-assistant/addon-wyoming-piper:latest
    env:
    - name: TZ
      value: "Europe/Berlin"
    - name: PIPER_VOICE
      value: "{{PIPER_VOICE}}"
    ports:
    - containerPort: 10200
      hostPort: 10200
    volumeMounts:
    - mountPath: /data
      name: piper-data

  # 6. openWakeWord (Wake-word detection via Wyoming protocol)
  - name: openwakeword
    image: ghcr.io/home-assistant/addon-wyoming-openwakeword:latest
    env:
    - name: TZ
      value: "Europe/Berlin"
    ports:
    - containerPort: 10400
      hostPort: 10400

  volumes:
  # Persistence
  - name: ha-config
    hostPath:
      path: {{DATA_DIR}}/home-assistant/homeassistant
      type: DirectoryOrCreate
  - name: zwave-config
    hostPath:
      path: {{DATA_DIR}}/home-assistant/zwave-js
      type: DirectoryOrCreate
  - name: matter-config
    hostPath:
      path: {{DATA_DIR}}/home-assistant/matter-server
      type: DirectoryOrCreate
  - name: whisper-data
    hostPath:
      path: {{DATA_DIR}}/home-assistant/whisper
      type: DirectoryOrCreate
  - name: piper-data
    hostPath:
      path: {{DATA_DIR}}/home-assistant/piper
      type: DirectoryOrCreate

  # System Mounts
  - name: dbus
    hostPath:
      path: /run/dbus
      type: Directory
  - name: zwave-stick
    hostPath:
      path: {{ZWAVE_DEVICE}}
      type: CharDevice
