apiVersion: v1
kind: Pod
metadata:
  name: open-webui
  labels:
    app: open-webui
  annotations:
    servicebay.label: "Open WebUI (Family Chat)"
    servicebay.schema-version: "2"
    servicebay.ports: "{{OPEN_WEBUI_PORT}}/tcp"
    # Open WebUI routes through Hermes' OpenAI-compatible API so every
    # chat goes through Hermes' agent loop — tool calls, holographic/
    # honcho memory, cloud_audit logging (#921), the OSCAR skill set.
    # Hermes in turn talks to the local Ollama. Bypassing Hermes (an
    # earlier draft pointed OLLAMA_BASE_URL straight at ollama) gave
    # operators a raw-LLM chat surface that didn't satisfy #926's
    # sovereignty / memory / privacy intents.
    servicebay.dependencies: "ollama,hermes,nginx,auth"
    servicebay.healthcheck: |
      url: http://127.0.0.1:{{OPEN_WEBUI_PORT}}/health
      interval: 30s
      timeout: 5s
      startup_timeout: 5m
spec:
  # hostNetwork so the bare 127.0.0.1:OLLAMA_PORT call works out of the
  # box — same pattern hermes uses to reach ollama. NPM proxies the
  # public-side chat.<domain> down to OPEN_WEBUI_PORT on the host
  # loopback behind Authelia forward-auth.
  hostNetwork: true
  containers:
  - name: open-webui
    image: ghcr.io/open-webui/open-webui:main
    env:
    # Route through Hermes' OpenAI-compatible /v1 surface (NOT
    # straight at ollama) so every chat passes through the agent
    # loop — see the dependencies comment above. The model dropdown
    # in the UI surfaces what Hermes' /v1/models returns; today that's
    # the single `hermes-agent` entry, and Hermes' config.yaml decides
    # which underlying ollama model handles each turn.
    - name: OPENAI_API_BASE_URL
      value: "http://127.0.0.1:{{HERMES_API_PORT}}/v1"
    - name: OPENAI_API_KEY
      value: "{{HERMES_API_KEY}}"
    # Disable Open WebUI's direct-to-Ollama integration; we want the
    # Hermes path to be the only one. Setting OLLAMA_BASE_URL to an
    # empty string makes upstream skip the Ollama backend entirely.
    - name: OLLAMA_BASE_URL
      value: ""
    - name: ENABLE_OLLAMA_API
      value: "false"
    # Bind only to the loopback that NPM proxies. Direct LAN hits to
    # this port would bypass Authelia, which we explicitly don't want
    # — chat history surfaces every conversation, treat it like the
    # Hermes dashboard.
    - name: HOST
      value: "127.0.0.1"
    - name: PORT
      value: "{{OPEN_WEBUI_PORT}}"
    # Signed JWT secret for the in-app session cookie. Auto-generated
    # by the wizard so a teardown + reinstall doesn't reuse a
    # cracked / leaked value. Operators rarely need to know this.
    - name: WEBUI_SECRET_KEY
      value: "{{OPEN_WEBUI_SECRET}}"
    # Open WebUI's first-account-becomes-admin bootstrap requires
    # ENABLE_SIGNUP=true at the moment that first signup happens —
    # there's no headless admin-create API. Setting this to false
    # before any account exists locks even the operator out of the
    # initial admin-create form ("You do not have permission to access
    # this resource" — observed live on 192.168.178.100). Leaving it
    # true is safe in our threat model because Authelia 1FA gates the
    # URL: a stranger can't reach the signup form without an LLDAP
    # account in the first place. After the admin lands, they flip
    # "Enable New Sign Ups" off via Settings → Users for the
    # operator-provisions-members policy.
    - name: ENABLE_SIGNUP
      value: "true"
    # Telemetry opt-out, matching the rest of the household stack's
    # privacy-first posture.
    - name: SCARF_NO_ANALYTICS
      value: "true"
    - name: DO_NOT_TRACK
      value: "true"
    - name: ANONYMIZED_TELEMETRY
      value: "false"
    ports:
    - containerPort: {{OPEN_WEBUI_PORT}}
    volumeMounts:
    - mountPath: /app/backend/data
      name: open-webui-data
  volumes:
  - name: open-webui-data
    hostPath:
      path: {{DATA_DIR}}/open-webui
      type: DirectoryOrCreate
