apiVersion: v1
kind: Pod
metadata:
  name: vaultwarden
  labels:
    app: vaultwarden
  annotations:
    servicebay.label: "Passwords"
    servicebay.schema-version: "2"
    servicebay.ports: "{{VAULTWARDEN_PORT}}/tcp"
    # Install order: proxy + SSO foundation needs to land first so the
    # post-deploy OIDC-client registration can talk to Authelia and the
    # vault.<domain> proxy route resolves to a running NPM.
    servicebay.dependencies: "nginx,auth"
    # Continuous health probe (#628). `/alive` is Vaultwarden's
    # unauthenticated liveness endpoint — returns the current UTC
    # timestamp on a healthy instance.
    servicebay.healthcheck: |
      url: http://localhost:{{VAULTWARDEN_PORT}}/alive
      interval: 30s
      timeout: 5s
      startup_timeout: 5m
spec:
  # #817: Vaultwarden runs in its own network namespace (no
  # hostNetwork), so a compromised container can't reach the host's
  # other service ports or the ServiceBay control API. Two consequences
  # the config handles:
  #   1. The port is published to the host explicitly via `hostPort`
  #      on the container port below.
  #   2. Vaultwarden does *server-side* OIDC discovery against
  #      https://auth.<PUBLIC_DOMAIN>. An isolated container's resolver
  #      doesn't apply AdGuard's `*.PUBLIC_DOMAIN → LAN IP` rewrite
  #      (#408), so the `hostAliases` entry pins that one name to a
  #      host-reachable IP — HOST_GATEWAY_IP, podman's
  #      `host.containers.internal`. It must NOT be the host's LAN IP:
  #      a rootless-podman pod can't reach the host's own LAN IP (#817).
  #      The request flows container → host → NPM → Authelia — the only
  #      path Authelia accepts (it validates the canonical https issuer,
  #      kept intact by reusing the `auth.<PUBLIC_DOMAIN>` name, and the
  #      X-Forwarded headers NPM sets).
  hostAliases:
    - ip: "{{HOST_GATEWAY_IP}}"
      hostnames:
        - "auth.{{PUBLIC_DOMAIN}}"
  containers:
  - name: vaultwarden
    image: docker.io/vaultwarden/server:latest
    env:
    - name: DOMAIN
      value: "{{VAULTWARDEN_DOMAIN}}"
    - name: SIGNUPS_ALLOWED
      value: "{{VAULTWARDEN_SIGNUPS}}"
    # Authelia SSO — enabled by default so family members log in once
    # via the household password and have access to every service.
    # Wizard auto-registers the matching OIDC client with Authelia
    # using the same VAULTWARDEN_SSO_SECRET below. Flip to false in
    # the wizard if you need to fall back to local-account auth.
    - name: SSO_ENABLED
      value: "{{VAULTWARDEN_SSO_ENABLED}}"
    - name: SSO_AUTHORITY
      value: "https://auth.{{PUBLIC_DOMAIN}}"
    - name: SSO_CLIENT_ID
      value: "vaultwarden"
    - name: SSO_CLIENT_SECRET
      value: "{{VAULTWARDEN_SSO_SECRET}}"
    - name: SSO_SCOPES
      value: "email profile"
    # Rocket binds {{VAULTWARDEN_PORT}} on 0.0.0.0 inside the pod
    # netns (Vaultwarden's default ROCKET_ADDRESS); `hostPort` below
    # publishes it on the host. Bridge networking means there's no
    # collision with NPM's :80 — they're in separate namespaces.
    - name: ROCKET_PORT
      value: "{{VAULTWARDEN_PORT}}"
    ports:
    - containerPort: {{VAULTWARDEN_PORT}}
      hostPort: {{VAULTWARDEN_PORT}}
    volumeMounts:
    - mountPath: /data
      name: vaultwarden-data
  volumes:
  - name: vaultwarden-data
    hostPath:
      path: {{DATA_DIR}}/vaultwarden
      type: DirectoryOrCreate
